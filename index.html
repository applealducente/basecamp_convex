<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConvEx — Agent Handbook</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#F8F7F4;--surface:#FFFFFF;--surface2:#F1F0EB;--surface3:#E8E7E2;
--ink:#1B1B1F;--ink2:#3F3F46;--ink-soft:#71717A;--ink-muted:#A1A1AA;
--border:#DDDCD7;--border2:#CCCBC6;
--navy:#1E3A5F;--gold:#C5A44E;--gold-soft:#FAF6EA;--gold-border:#E5D5A0;
--green:#16A34A;--green-soft:#F0FDF4;--blue:#2563EB;--blue-soft:#EFF6FF;
--red:#DC2626;--red-soft:#FEF2F2;--purple:#7C3AED;--purple-soft:#F5F3FF;
--amber:#D97706;--amber-soft:#FFFBEB;--orange:#EA580C;--orange-soft:#FFF7ED;
--radius:14px;--radius-sm:8px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
a{color:var(--navy);text-decoration:underline;text-underline-offset:2px;}
a:hover{color:var(--gold);}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--navy);padding:0 28px;display:flex;align-items:center;gap:16px;height:56px;}
.topbar-logo img{height:38px;display:block;}
.topbar-search{flex:1;max-width:380px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.15);border-radius:var(--radius-sm);padding:8px 14px;font-size:13.5px;color:#fff;font-family:inherit;outline:none;transition:all 0.15s;}
.topbar-search:focus{background:rgba(255,255,255,0.2);border-color:var(--gold);}
.topbar-search::placeholder{color:rgba(255,255,255,0.45);}
.topbar-back{display:none;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.12s;}
.topbar-back:hover{background:rgba(255,255,255,0.2);}
.showing-page .topbar-back{display:block;}
.mgr-btn{margin-left:auto;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);border-radius:var(--radius-sm);padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.mgr-btn:hover{background:rgba(255,255,255,0.15);color:#fff;}
.mgr-btn.on{background:var(--gold-soft);color:var(--gold);border-color:var(--gold-border);}

/* HERO */
.hero{padding:40px 24px 4px;max-width:800px;margin:0 auto;text-align:center;}
.hero-logo{margin-bottom:16px;}
.hero-logo img{height:72px;}
.hero h1{font-size:28px;font-weight:700;letter-spacing:-0.03em;color:var(--ink);}
.hero p{color:var(--ink-soft);font-size:14px;margin-top:8px;line-height:1.6;}
.showing-page .hero{display:none;}

/* TABS */
.cat-tabs{display:flex;gap:6px;justify-content:center;padding:18px 24px 6px;flex-wrap:wrap;}
.showing-page .cat-tabs{display:none;}
.cat-tab{padding:7px 16px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--ink-soft);transition:all 0.15s;}
.cat-tab:hover{background:var(--surface2);color:var(--ink2);border-color:var(--border2);transform:translateY(-1px);}
.cat-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* HOME GRID */
.home{padding:14px 24px 50px;max-width:960px;margin:0 auto;}
.showing-page .home{display:none;}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin:24px 0 10px 4px;display:flex;align-items:center;gap:8px;color:var(--ink-soft);}
.section-label .dot{width:7px;height:7px;border-radius:50%;}
.section-label:first-child{margin-top:4px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}

.card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 18px 16px;cursor:pointer;transition:all 0.18s;position:relative;}
.card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(30,58,95,0.06),0 0 0 2px var(--gold-soft);transform:translateY(-2px);}
.card-icon{font-size:26px;margin-bottom:10px;display:block;}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.3;color:var(--ink);}
.card-desc{font-size:12px;color:var(--ink-soft);line-height:1.5;}
.card-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.06em;padding:3px 8px;border-radius:5px;margin-top:10px;text-transform:uppercase;}
.tag-training{background:var(--green-soft);color:var(--green);}
.tag-tools{background:var(--blue-soft);color:var(--blue);}
.tag-aftersales{background:var(--orange-soft);color:var(--orange);}
.tag-compliance{background:var(--red-soft);color:var(--red);}
.tag-templates{background:var(--amber-soft);color:var(--amber);}
.tag-support{background:var(--purple-soft);color:var(--purple);}

.card-edit-btn{display:none;position:absolute;top:8px;right:8px;background:var(--gold-soft);border:1px solid var(--gold-border);color:var(--gold);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.admin-on .card-edit-btn{display:block;}
.add-card{background:var(--surface2);border:2px dashed var(--border);border-radius:var(--radius);padding:28px;cursor:pointer;display:none;text-align:center;color:var(--ink-muted);font-size:13px;font-weight:600;transition:all 0.15s;}
.add-card:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-soft);}
.admin-on .add-card{display:block;}

/* PAGE VIEW */
.page-view{display:none;padding:32px 24px 80px;max-width:740px;margin:0 auto;animation:fadeUp 0.2s ease;}
.showing-page .page-view{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

.pv-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:5px;margin-bottom:14px;}
.pv-h1{font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.2;margin-bottom:6px;}
.pv-sub{font-size:14px;color:var(--ink-soft);margin-bottom:28px;line-height:1.6;}

.pv-body h2{font-size:17px;font-weight:700;margin:28px 0 10px;padding-bottom:8px;border-bottom:1.5px solid var(--border);color:var(--navy);}
.pv-body h3{font-size:13.5px;font-weight:700;margin:18px 0 6px;color:var(--gold);}
.pv-body p{font-size:13.5px;line-height:1.8;color:var(--ink2);margin-bottom:10px;}
.pv-body ul,.pv-body ol{font-size:13.5px;line-height:1.8;padding-left:20px;margin-bottom:12px;color:var(--ink2);}
.pv-body li{margin-bottom:4px;}
.pv-body strong{color:var(--ink);font-weight:700;}
.pv-body code{background:var(--surface2);padding:2px 7px;border-radius:4px;font-size:12px;font-family:monospace;color:var(--navy);}

.pv-body .callout{background:var(--surface2);border-left:3px solid var(--navy);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 16px;font-size:13px;margin:14px 0;line-height:1.7;color:var(--ink2);}
.pv-body .callout.gold{border-left-color:var(--gold);background:var(--gold-soft);}
.pv-body .callout.red{border-left-color:var(--red);background:var(--red-soft);}

.pv-body table.kb-table{width:100%;border-collapse:collapse;margin:12px 0 16px;font-size:13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.pv-body table.kb-table th,.pv-body table.kb-table td{border:1px solid var(--border);padding:8px 12px;text-align:left;}
.pv-body table.kb-table th{background:var(--navy);color:#fff;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}

/* Highlighted fields in templates */
.hl{background:#FEF3C7;color:#92400E;padding:1px 4px;border-radius:3px;font-weight:600;}

/* Step boxes */
.step-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin:10px 0;font-size:13px;line-height:1.7;}
.step-box ol{padding-left:18px;}

/* Copyable blocks */
.copy-block{position:relative;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 60px 14px 14px;margin:12px 0;font-size:12.5px;line-height:1.7;color:var(--ink2);white-space:pre-wrap;font-family:inherit;}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--navy);border:none;border-radius:5px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;color:#fff;font-family:inherit;transition:all 0.12s;}
.copy-btn:hover{background:var(--gold);}
.copy-btn.copied{background:var(--green);}

/* Template dropdown */
.tpl-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;color:var(--ink);background:#fff;margin:8px 0 12px;cursor:pointer;transition:border-color 0.15s;}
.tpl-select:hover{border-color:var(--gold);}
.tpl-select:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,95,0.08);}

/* Edit modal */
.edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;}
.edit-overlay.show{display:flex;}
.edit-modal{background:#fff;border-radius:var(--radius);padding:24px;width:90%;max-width:680px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.edit-modal h2{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--navy);}
.edit-modal label{display:block;font-size:11px;font-weight:600;color:var(--ink-soft);margin:10px 0 4px;text-transform:uppercase;letter-spacing:0.05em;}
.edit-modal input,.edit-modal textarea,.edit-modal select{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;}
.edit-modal input:focus,.edit-modal textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,95,0.08);}
.edit-modal textarea{min-height:220px;resize:vertical;}
.edit-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
.edit-btns button{padding:8px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;}
.btn-save{background:var(--navy);color:#fff;}
.btn-save:hover{background:#152D4A;}
.btn-cancel{background:var(--surface2);color:var(--ink2);border:1.5px solid var(--border);}
.btn-delete{background:var(--red-soft);color:var(--red);border:1.5px solid #FCA5A5;}
.edit-hint{font-size:10px;color:var(--ink-muted);margin-top:4px;line-height:1.5;}

/* Password modal */
.pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;}
.pw-overlay.show{display:flex;}
.pw-box{background:#fff;border-radius:var(--radius);padding:28px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.pw-box h3{font-size:16px;margin-bottom:4px;color:var(--navy);}
.pw-box p{font-size:12px;color:var(--ink-soft);margin-bottom:14px;}
.pw-box input{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;text-align:center;font-family:inherit;outline:none;}
.pw-box input:focus{border-color:var(--navy);}
.pw-box button{margin-top:12px;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.pw-err{color:var(--red);font-size:12px;margin-top:8px;display:none;}

.no-results{text-align:center;padding:60px 20px;color:var(--ink-muted);font-size:14px;}
.site-footer{text-align:center;padding:28px 20px;color:var(--ink-muted);font-size:10.5px;border-top:1px solid var(--border);}
.showing-page .site-footer{display:none;}

@media(max-width:640px){
.topbar{padding:0 14px;height:48px;gap:8px;}.topbar-logo img{height:24px;}.hero{padding:28px 16px 2px;}.hero h1{font-size:22px;}.hero-logo img{height:40px;}.home{padding:10px 14px 40px;}.card-grid{grid-template-columns:1fr;}.page-view{padding:20px 14px 60px;}.pv-h1{font-size:20px;}.cat-tabs{padding:12px 14px 2px;}.edit-modal{padding:18px;width:95%;}
}
</style>
</head>

<script>
var MGR_PW="convex2026";
var DEFAULT_PAGES=JSON.parse("[{\"id\": \"fcf-overview\", \"section\": \"Training\", \"icon\": \"\\ud83d\\udccb\", \"title\": \"Understanding FCF\", \"desc\": \"Membership positioning, free cleaning benefits, and full booking process.\", \"tag\": \"training\", \"body\": \"<h2>What is ForeverClean?</h2> <p>ForeverClean (FCF) is a membership-based cleaning program offering discounted cleaning services at affordable rates. Customers begin by activating their ForeverClean membership and using their free first cleaning benefit. The membership activates immediately after enrollment.</p> <h3>What's Included</h3> <ul><li>Discounted future cleaning rates (approx. $23/hr)</li><li>Access to recurring cleaning services</li><li>Dashboard access for booking management</li><li>Flexible scheduling options</li><li>24/7 customer support</li></ul> <h3>Standard Cleaning Covers</h3> <p>Cleaning supplies including vacuum, kitchen cleaning, bedroom cleaning, bathroom cleaning, dusting, vacuuming, and mopping.</p> <h3>Premium Tasks (+1 hour each)</h3> <p>Oven cleaning, refrigerator cleaning, interior windows, baseboards, laundry, cabinets.</p> <h3>Not Covered</h3> <p>Heavy lifting, outdoor work, carpet shampooing, mold removal, deep stain removal, pet waste cleaning.</p> <h2>Time Recommendation Table</h2> <table class=\\\"kb-table\\\"><tr><th>Hours</th><th>Kitchen</th><th>Bathrooms</th><th>Bedrooms</th></tr><tr><td>2 hr</td><td>Yes</td><td>1</td><td>0</td></tr><tr><td>3 hr</td><td>Yes</td><td>1</td><td>1</td></tr><tr><td>4 hr</td><td>Yes</td><td>2</td><td>1-2</td></tr><tr><td>6 hr</td><td>Yes</td><td>3+</td><td>3+</td></tr></table> <div class=\\\"callout\\\">Recommended package: 6-hour cleaning.</div> <h2>Negotiation Levers: MF &amp; MCT</h2> <table class=\\\"kb-table\\\"><tr><th>Monthly Fee</th><th>MCT</th></tr><tr><td>$59 \\u2014 No Change</td><td>6 Months \\u2014 No Change</td></tr><tr><td>$54 \\u2014 $5 Off</td><td>5 Months \\u2014 Reduce by 1</td></tr><tr><td>$49 \\u2014 $10 Off</td><td>4 Months \\u2014 Reduce by 2</td></tr></table> <p>Only adjust when there is a clear customer objection or budget concern.</p> <h2>How to Book</h2> <ol><li>Set up customer account using Incognito Mode</li><li>Collect all required info (name, ZIP, phone, email, card)</li><li>Explain membership fees and terms clearly</li><li>Confirm customer understands all terms</li><li>Verify all details before finalizing</li></ol> <h3>Cleaning Notes 101</h3> <p>Always include: priority areas, preferences, pet info, entry instructions, areas to avoid.</p> <div class=\\\"callout gold\\\">ETF applies if cancelled before 6 paid months. Formula: $35 \\u00d7 number of initial cleaning hours.</div>\"}, {\"id\": \"types-of-cleanings\", \"section\": \"Training\", \"icon\": \"\\ud83e\\uddf9\", \"title\": \"Types of Cleanings\", \"desc\": \"Standard, deep, and move-out cleaning explained.\", \"tag\": \"training\", \"body\": \"<h2>Standard Cleaning</h2> <p>Regular routine cleaning for day-to-day upkeep: dusting surfaces, vacuuming carpets, sweeping/mopping hard floors, kitchen countertops and sinks, bathroom spot-cleaning, trash removal, general tidying.</p> <h2>Deep Cleaning</h2> <div class=\\\"callout red\\\">Cleaners do NOT offer most deep cleaning services. DO NOT offer deep cleaning unless customer specifically requests it.</div> <p>Detailed dusting, scrubbing/sanitizing grout, carpet/upholstery cleaning, window washing, air vents, inside oven/fridge/microwave, bathroom tiles/limescale, walls and baseboards.</p> <h2>Move-Out Cleaning</h2> <p>Thorough cleaning when vacating: all surfaces/baseboards, deep clean appliances, bathroom sanitization, floors, windows/glass, remove all trash and debris.</p>\"}, {\"id\": \"trial-onetime\", \"section\": \"Training\", \"icon\": \"\\ud83e\\uddea\", \"title\": \"Trial & One-Time Cleaning\", \"desc\": \"When membership isn't ideal \\u2014 offer these alternatives.\", \"tag\": \"training\", \"body\": \"<h2>Trial Cleaning</h2> <p>30-day FC membership trial, no commitment. Cancel within 30 days.</p> <ul><li>After 30 days: auto-begins at $59/month</li><li>Rates at approx. $23/hr (includes 15% transaction fee)</li><li>Cancelling after trial: $99 termination fee</li></ul> <h2>One-Time Cleaning</h2> <p>Single cleaning, no commitment. Pay once, no membership.</p> <h2>How to Book</h2> <ol><li>Incognito \\u2192 homeaglow.com/customer/choosedate</li><li>Enter ZIP, date/time, hours</li><li>Enter email \\u2192 \\\"See available Cleaners\\\"</li><li>\\\"Got it\\\" on 0.5hr voucher (invalidate unless customer knows)</li><li>Contact info + payment \\u2192 \\\"I agree, Get Clean!\\\"</li><li>Cleaning notes, pets, entry, extras \\u2192 Submit</li><li>Close incognito \\u2192 after-sales</li></ol> <div class=\\\"callout gold\\\">Trial FC Forced: monthly $59, free months 1, months off 0, cancel fee min 6mo, fee $99, billed every 1, policy 99etf. One-Time: ALL fields blank.</div>\"}, {\"id\": \"training-roadmap\", \"section\": \"Training\", \"icon\": \"\\ud83d\\uddfa\\ufe0f\", \"title\": \"Training Journey Roadmap\", \"desc\": \"From trainee to certified closer.\", \"tag\": \"training\", \"body\": \"<h2>1. Foundations Training</h2><p>Communication, customer needs, sales strategies, industry practices.</p> <h2>2. Product Training (Blended)</h2><p>Core skills: communication, service, sales techniques.</p> <h2>3. Product Knowledge Test</h2><p>15% of overall score.</p> <h2>4. Call Certification (Mock Call)</h2><p>Passing score: 100%. Failure may result in offboarding.</p> <h2>5. Nesting (Weeks 1 & 2)</h2><p>75% of overall score. Live sales tasks.</p> <div class=\\\"callout gold\\\">Failure to close 2+ sales/week may result in offboarding. 3 sales Week 1 = auto endorsed. 2 sales Weeks 1&2 = Nesting Extension.</div> <h2>6. Nesting Extension (Final Week)</h2><p>Minimum 3 sales to pass.</p>\"}, {\"id\": \"hubspot-tagging\", \"section\": \"Tools & Systems\", \"icon\": \"\\ud83c\\udff7\\ufe0f\", \"title\": \"HubSpot Tagging Guide\", \"desc\": \"Ticket status tags and how to use them.\", \"tag\": \"tools\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Tag</th><th>When to Use</th></tr><tr><td><strong>New</strong></td><td>Unsorted leads</td></tr><tr><td><strong>Assigned</strong></td><td>Team member responsible</td></tr><tr><td><strong>Explicit 24hr Callback</strong></td><td>Follow-up within 24 hours</td></tr><tr><td><strong>In Progress (1-5)</strong></td><td>Being handled. Number = contact attempts.</td></tr><tr><td><strong>Closed as No Answer</strong></td><td>Attempts unsuccessful</td></tr><tr><td><strong>Closed As Sale</strong></td><td>Successfully converted</td></tr><tr><td><strong>Closed as DNC</strong></td><td>Customer requests no contact</td></tr><tr><td><strong>Closed as Decline</strong></td><td>Customer declines</td></tr><tr><td><strong>(Temp) Escalate</strong></td><td>Higher-level internal use</td></tr><tr><td><strong>Closed (Do Not Use)</strong></td><td>Higher-level internal use</td></tr></table> <h2>As-Is vs Actionable</h2> <h3>As-Is</h3><p>No further action: New, Assigned, In Progress, Explicit 24hr, (Temp) Escalate, Closed (Do Not Use).</p> <h3>Actionable</h3><ul><li><strong>No Answer:</strong> Unanswered/voicemail</li><li><strong>DNC:</strong> Cessation request or invalid number</li><li><strong>Decline:</strong> Cost, contracts, alternatives</li><li><strong>Sale:</strong> Job date + Django CID required</li></ul>\"}, {\"id\": \"ticket-dispositions\", \"section\": \"Tools & Systems\", \"icon\": \"\\ud83d\\udcca\", \"title\": \"Ticket Dispositions\", \"desc\": \"Status movement rules and when to use each tag.\", \"tag\": \"tools\", \"body\": \"<div class=\\\"callout\\\">What you log determines what leadership sees.</div> <h2>Status Movement</h2> <p>After first outreach (AM Touch) \\u2192 In Progress (2nd Attempt). No ticket stays New/Assigned after initial outreach.</p> <h3>Day 2</h3><p>After 3rd attempt \\u2192 In Progress (3rd).</p> <h3>Day 3</h3><p>One outreach. After 4th \\u2192 In Progress (4th/5th).</p> <h2>Tag Usage</h2> <h3>Closed as Declined</h3><p>After objection handling. Select decline reason.</p> <h3>No Answer</h3><p>After all attempts. Must complete all 3 required calls.</p> <h3>DNC</h3><p>Only when clearly requested. Sub-reasons: Existing, Disconnected, Language, Outside U.S., explicit DNC.</p> <h3>Sale</h3><p>Select type (DHJ/Trial/OTC), date, CID.</p> <div class=\\\"callout red\\\">If it's not updated correctly, it didn't happen.</div>\"}, {\"id\": \"lead-management\", \"section\": \"Tools & Systems\", \"icon\": \"\\ud83d\\udcd1\", \"title\": \"Ticket & Lead Management\", \"desc\": \"HubSpot views, filters, columns, and pipeline.\", \"tag\": \"tools\", \"body\": \"<h2>Saved View Tab</h2><p>Your personal working setup. Clone from All Tickets.</p> <div class=\\\"callout\\\">Lost in HubSpot? Go back to your Saved View.</div> <h2>Table vs Board View</h2> <table class=\\\"kb-table\\\"><tr><th>Table View \\u2705</th><th>Board View \\ud83d\\udeab</th></tr><tr><td>Row-by-row, easy scan, faster</td><td>Card layout, more clicking, error risk</td></tr></table> <h2>Recommended Columns</h2><p>Ticket Name, Note, Phone, Contacts, Email, State, Owner Assigned Date, Status, Time Since Last Call, Timezone, Last Activity, First Outbound Call, 2nd Outbound Status.</p> <div class=\\\"callout red\\\">Before any call: confirm Pipeline correct + Ticket Owner = Me.</div> <h2>Common Filters</h2><ul><li>Assigned + 2nd Week \\u2192 AM/PM touches</li><li>In Progress (3rd Attempt)</li><li>Inbound SMS/Call Required</li></ul>\"}, {\"id\": \"aircall-dispositions\", \"section\": \"Tools & Systems\", \"icon\": \"\\ud83d\\udcde\", \"title\": \"Aircall Dispositions\", \"desc\": \"How to tag calls in Aircall.\", \"tag\": \"tools\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Tag</th><th>When</th></tr><tr><td><strong>Growth | Call Did Not Connect</strong></td><td>Auto drop, VM, No answer, Wrong number, Failed</td></tr><tr><td><strong>Growth | Explicit DNC</strong></td><td>\\\"Stop calling me\\\" / \\\"Remove me\\\"</td></tr><tr><td><strong>Growth | Not a Sales Lead</strong></td><td>Wrong number, Cleaner applicant, Vendor, Unrelated</td></tr><tr><td><strong>Growth | Existing Customer</strong></td><td>Already has account</td></tr><tr><td><strong>Growth | Callback Request</strong></td><td>\\\"Call me back later\\\"</td></tr><tr><td><strong>Growth | Did Not Buy</strong></td><td>Objections / Declined</td></tr><tr><td><strong>Growth | SALES</strong></td><td>You closed the sale!</td></tr></table>\"}, {\"id\": \"dnc-handling\", \"section\": \"Tools & Systems\", \"icon\": \"\\ud83d\\udeab\", \"title\": \"DNC Handling\", \"desc\": \"Step-by-step when a customer says Do Not Call.\", \"tag\": \"tools\", \"body\": \"<p>Complete ALL four steps:</p> <h2>Step 1 \\u2014 Aircall</h2><p>Tag <code>Growth | Explicit DNC Request</code></p> <h2>Step 2 \\u2014 HubSpot</h2><p>Tag: <strong>Closed as Do Not Call</strong></p> <h2>Step 3 \\u2014 Django</h2><p>Lead profile \\u2192 <strong>Do > Deactivate > Unsubscribe</strong></p> <h2>Step 4 \\u2014 DNC Tracker Sheet</h2><p>Log with details and reason.</p> <div class=\\\"callout red\\\">Missing any step = ZTP Level 5 (terminable on first offense).</div>\"}, {\"id\": \"voicelab\", \"section\": \"Tools & Systems\", \"icon\": \"\\ud83c\\udf99\\ufe0f\", \"title\": \"VoiceLab\", \"desc\": \"AI voice sales call simulator.\", \"tag\": \"tools\", \"body\": \"<p>Practice live FCF sales calls against an AI voice simulator.</p> <table class=\\\"kb-table\\\"><tr><th>Component</th><th>Link</th></tr><tr><td>Simulator</td><td><code>voice-lab-rose.vercel.app</code></td></tr><tr><td>Dashboard</td><td><code>voicelab-v1-0.vercel.app</code></td></tr></table>\"}, {\"id\": \"email-fcf-3hr\", \"section\": \"Templates\", \"icon\": \"\\ud83d\\udce7\", \"title\": \"Post-Sale Email: FCF 3hr\", \"desc\": \"Email template for 3-hour FCF sale.\", \"tag\": \"templates\", \"body\": \"<div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer),  Thank you for taking the call. Your ForeverClean membership is active as of today.  As discussed, your (Date), X-hour cleaning request has been submitted to the top cleaners in your area. Your first 3 hours of this cleaning are completely free, covered by your ForeverClean membership. Any cleaning time beyond your first 3 free hours will be billed at around $23 per hour.  A $19 charge has been processed today. This serves as your first month of ForeverClean membership. Your ForeverClean membership will automatically renew each month, on the same date, until you choose to cancel. Starting from your second month, the regular ForeverClean membership fee of $59 (taxes may apply) will be charged.  You can cancel your ForeverClean membership at any time. If you cancel before X paid months, your first appointment will be charged at $35/hr multiplied by the number of hours of your initial cleaning, for a total of <$XX.XX> plus applicable taxes. You agreed to these terms at sign-up, which can be found at https://try.homeaglow.com/deal, as well as in our Terms of Service &amp; Help Center.  A quick ForeverClean summary: - Unlimited cleanings starting at just $40.00 for 2 hrs (a $60.00 savings)(monthly, weekly, or yes even daily!) - Unlimited access to Homeaglow background-checked cleaners - 365 day a year availability - Free cancellations &amp; reschedules up to 24 hours before appointments  You can manage your appointments and your membership through this link: &lt;C Do -> Auto Login -> Dashboard&gt;  Thank you,</div>\"}, {\"id\": \"email-fcf-4hr\", \"section\": \"Templates\", \"icon\": \"\\ud83d\\udce7\", \"title\": \"Post-Sale Email: FCF 4hr\", \"desc\": \"Email template for 4-hour FCF sale.\", \"tag\": \"templates\", \"body\": \"<div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer),  Thank you for taking the call. Your ForeverClean membership is active as of today.  As discussed, your (Date), 4-hour cleaning request has been submitted to the top cleaners in your area.  A total of $38 has been processed today. The $19 covers your first month of ForeverClean membership and includes 3 free hours of cleaning. The additional $19 is the upcharge for the extra 1 hour, since your home requires 4 hours instead of 3. Any cleaning time beyond your first 4 hours will be billed at around $23 per hour.  Your ForeverClean membership will automatically renew each month, on the same date, until you choose to cancel. Starting from your second month, the regular ForeverClean membership fee of $59 (taxes may apply) will be charged.  You can cancel your ForeverClean membership at any time. If you cancel before X paid months, your first appointment will be charged at $35/hr multiplied by the number of hours of your initial cleaning, for a total of $140 plus applicable taxes. You agreed to these terms at sign-up, which can be found at https://try.homeaglow.com/deal, as well as in our Terms of Service &amp; Help Center.  A quick ForeverClean summary: - Unlimited cleanings starting at just $40.00 for 2 hrs (a $60.00 savings)(monthly, weekly, or yes even daily!) - Unlimited access to Homeaglow background-checked cleaners - 365 day a year availability - Free cancellations &amp; reschedules up to 24 hours before appointments  You can manage your appointments and your membership through this link: &lt;C Do -> Auto Login -> Dashboard&gt;  Thank you,</div>\"}, {\"id\": \"email-fcf-6hr\", \"section\": \"Templates\", \"icon\": \"\\ud83d\\udce7\", \"title\": \"Post-Sale Email: FCF 6hr\", \"desc\": \"Email template for 6-hour FCF sale.\", \"tag\": \"templates\", \"body\": \"<div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer),  Thank you for taking the call. Your ForeverClean membership is active as of today.  As discussed, your (Date), 6-hour cleaning request has been submitted to the top cleaners in your area.  A total of $78 has been processed today. The $19 covers your first month of ForeverClean membership and includes 3 free hours of cleaning. The additional $59 is the upcharge for the extra 3 hours, since your home requires 6 hours instead of 3. Any cleaning time beyond your first 6 hours will be billed at around $23 per hour.  Your ForeverClean membership will automatically renew each month, on the same date, until you choose to cancel. Starting from your second month, the regular ForeverClean membership fee of $59 (taxes may apply) will be charged.  You can cancel your ForeverClean membership at any time through your dashboard. If you cancel before X paid months, your first appointment will be charged at $35/hr multiplied by the number of hours of your initial cleaning, for a total of $210 plus applicable taxes. You agreed to these terms at sign-up, which can be found at https://try.homeaglow.com/deal, as well as in our Terms of Service &amp; Help Center.  A quick ForeverClean summary: - Unlimited cleanings starting at just $40.00 for 2 hrs (a $60.00 savings)(monthly, weekly, or yes even daily!) - Unlimited access to Homeaglow background-checked cleaners - 365 day a year availability - Free cancellations &amp; reschedules up to 24 hours before appointments  You can manage your appointments and your membership through this link: &lt;C Do -> Auto Login -> Dashboard&gt;  Thank you,</div>\"}, {\"id\": \"email-dhj\", \"section\": \"Templates\", \"icon\": \"\\ud83d\\udce7\", \"title\": \"Post-Sale Email: DHJ Voucher\", \"desc\": \"Email template for DHJ Voucher sale.\", \"tag\": \"templates\", \"body\": \"<div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer),  Thank you for taking the call.  As discussed, your (Date), X hours cleaning request has been submitted to the Top cleaners in your area. This appointment will be covered by the X-hr voucher you purchased.  After your first appointment, your ForeverClean membership will activate and the first membership fee of $59 (taxes may apply) will be charged. Your ForeverClean membership will then automatically renew each month at $59 (taxes may apply), on the same date, until you choose to cancel. With ForeverClean, your future cleanings are heavily discounted at around $23 per hour.  ForeverClean memberships can be canceled at any time, but cancellations made before X paid months will result in your first appointment on (Date) being charged at $35/hr multiplied by the number of hours of your initial cleaning. That's a total of <$XX.XX>. You agreed to these terms at purchase, which can be found on https://try.homeaglow.com/deal, as well as in our Terms of Service &amp; Help Center.  A quick ForeverClean summary: - Unlimited cleanings starting at just $40.00 for 2 hrs (a $60.00 savings)(monthly, weekly, or yes even daily!) - Unlimited access to Homeaglow background-checked cleaners - 365 day a year availability - Free cancellations &amp; reschedules up to 24 hours before appointments  You can manage your appointments and your membership through this link: &lt;C Do -> Auto Login -> Dashboard&gt;  Thank you,</div>\"}, {\"id\": \"vm-sms-scripts\", \"section\": \"Templates\", \"icon\": \"\\ud83d\\udcac\", \"title\": \"VM & SMS Scripts\", \"desc\": \"Voicemail messages and SMS outreach scripts by day.\", \"tag\": \"templates\", \"body\": \"<h2>Day 1 \\u2014 AM Touch (Voicemail)</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], this is [Your Name] from Homeaglow! I noticed you visited our website or may have come across our $19 cleaning ad on social media. I'd love to help you take advantage of that and get your first cleaning scheduled. You can reach me at [Callback Number]. I'll also try again later today in case this isn't the best time. Talk soon!</div> <h2>Day 1 \\u2014 PM Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], it's [Your Name] again from Homeaglow. Just following up because I noticed you checked us out online or maybe saw our $19 cleaning offer on social media. It's a great way to get started, and I'd be happy to walk you through how it works. Call or text me back at [Callback Number] when you can!</div> <h2>Day 2 \\u2014 AM Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Good morning [Name], this is [Your Name] with Homeaglow. I wanted to follow up since you recently visited our website or might have seen our $19 cleaning ad. Many customers like to use that offer to try us out. Call me at [Callback Number], and I can help you set that up quickly.</div> <h2>Day 2 \\u2014 PM Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], it's [Your Name] again with Homeaglow. Just circling back\\u2014you may have seen our $19 cleaning ad on social media or checked us out online. It's a limited-time offer, and I'd love for you to take advantage of it. Give me a quick call at [Callback Number] when you're ready.</div> <h2>Day 3 \\u2014 One Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hello [Name], this is [Your Name] from Homeaglow. I've tried reaching you a few times because I noticed your interest in our $19 cleaning ad or website offer. It's an easy way to get started with a trusted cleaner in your area. Please return my call at [Callback Number], and I'll help get you set up.</div> <h2>Day 4 \\u2014 One Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], this is [Your Name] with Homeaglow. I just wanted to make one more attempt to connect. You may have visited our website or noticed our $19 cleaning ad, and I'd be happy to help you lock in that offer. If you're interested, call me back at [Callback Number].</div> <h2>Day 5 \\u2014 One Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], this is [Your Name] with Homeaglow. I just wanted to check in one more time before the weekend ends. If you saw our $19 cleaning ad or visited our site, now's a great chance to grab that offer. Call me back at [Callback Number] if you'd like me to help set it up.</div> <h2>SMS \\u2014 First Outreach</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer Name)! This is [Agent Name] from Homeaglow. We got your inquiry at Homeaglow.com/deals and saw you're interested in cleaning. We offer member vouchers: $9 for 2 hrs, $19 for 3 hrs, $39 for 4 hrs, $79 for 6 hrs. This covers your first cleaning! Let me know what works best!</div> <h2>SMS \\u2014 Second Outreach</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer Name), it's [Agent Name] again from Homeaglow. We've got your inquiry via homeaglow.com/deals and have great deals to help you keep your home sparkling! For $9, you get 2 hours of cleaning, or check out other options starting at $19 for 3 hours. Reply with GETCLEAN and I'd be happy to set up your first cleaning!</div> <h2>SMS \\u2014 Third Outreach (Urgency)</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer Name), just wanted to remind you about our special deals on cleaning services! Our schedule is filling up fast, and I'd love to get you booked for a cleaning that fits your needs. Reply with GETCLEAN now and I'd be happy to give you a call to secure your spot!</div> <h2>SMS \\u2014 Final Push</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer Name), this is your last chance to grab our exclusive cleaning deals before they're gone! Our schedule is almost full, and I'd hate for you to miss out. Reply with GETCLEAN now and I'll call you right away to lock in your spot.</div>\"}, {\"id\": \"ztp\", \"section\": \"Compliance\", \"icon\": \"\\u26d4\", \"title\": \"ZTP Violations (Level 5)\", \"desc\": \"Zero-tolerance \\u2014 terminable on first offense.\", \"tag\": \"compliance\", \"body\": \"<p>Level 5 offenses carry immediate consequences including possible termination on first instance.</p> <h2>1. Fraudulent Activities / Gross Negligence</h2><p>Mishandling credit card info: using one customer's card for another, storing details on notepads/screenshots/apps.</p> <h2>2. Security Violations</h2><p>Sending auto-login links to wrong users, compromising shared credentials.</p> <h2>3. Misrepresentation of Service</h2><p>Failing to disclose ForeverClean is a cleaning membership.</p> <h2>4. DNC Tagging</h2><p>Must immediately honor and tag DNC requests. Violations: contacting after DNC, failing to tag, continuing outreach, bypassing DNC.</p> <h2>5. Requesting Sensitive Info via Email/SMS</h2><p>NEVER request: card numbers, bank info, government IDs, financial credentials.</p> <div class=\\\"callout\\\">If a customer voluntarily sends sensitive info without being asked, the agent will NOT be penalized.</div>\"}, {\"id\": \"pv-level4\", \"section\": \"Compliance\", \"icon\": \"\\ud83d\\udd34\", \"title\": \"Protocol Violations \\u2014 Level 4\", \"desc\": \"High impact. Compliance and customer trust.\", \"tag\": \"compliance\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Violation</th><th>Penalty</th></tr><tr><td><strong>Idle Time</strong> \\u2014 No activity 4+ min while logged in</td><td rowspan=\\\"4\\\">1st: NTE \\u00b7 2nd: Final Warning \\u00b7 3rd: 5-Day Suspension \\u00b7 4th: Termination</td></tr><tr><td><strong>Improper Happiness Guarantee Use</strong></td></tr><tr><td><strong>Tagging Existing Lead as Sale</strong></td></tr><tr><td><strong>Incorrect Membership Positioning</strong></td></tr></table> <div class=\\\"callout red\\\">Level 4: NO clearing period. All offenses remain on record.</div>\"}, {\"id\": \"pv-level3\", \"section\": \"Compliance\", \"icon\": \"\\ud83d\\udfe1\", \"title\": \"Protocol Violations \\u2014 Level 3\", \"desc\": \"Moderate impact. Service quality and legal exposure.\", \"tag\": \"compliance\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Violation</th><th>Penalty</th></tr><tr><td><strong>Contacting Outside Business Hours</strong></td><td rowspan=\\\"6\\\">1st: Coaching \\u00b7 2nd: NTE \\u00b7 3rd: Final Warning \\u00b7 4th: 5-Day Suspension \\u00b7 5th: Termination</td></tr><tr><td><strong>No effort to overcome objections</strong></td></tr><tr><td><strong>Tone Violation</strong></td></tr><tr><td><strong>Failure to Pause/Resume Recording</strong></td></tr><tr><td><strong>Failure to mention MF/MCT</strong></td></tr><tr><td><strong>Ticket Improperly Marked as Sale</strong></td></tr></table> <div class=\\\"callout\\\">Levels 1-3: 1-month clearing period.</div>\"}, {\"id\": \"pv-level2\", \"section\": \"Compliance\", \"icon\": \"\\ud83d\\udfe0\", \"title\": \"Protocol Violations \\u2014 Level 2\", \"desc\": \"Low-moderate. Misinformation or inconsistent comms.\", \"tag\": \"compliance\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Violation</th><th>Penalty</th></tr><tr><td><strong>Incorrect Cohort Offer/Link</strong></td><td rowspan=\\\"6\\\">1st-2nd: Coaching \\u00b7 3rd: NTE \\u00b7 4th: Final Warning \\u00b7 5th: 3-Day Suspension \\u00b7 6th: Termination</td></tr><tr><td><strong>After-Sales/Compliance Gaps</strong></td></tr><tr><td><strong>Legal Wording Non-Compliance</strong></td></tr><tr><td><strong>Contact Attempts Non-Compliance</strong></td></tr><tr><td><strong>Incorrect HubSpot Tagging</strong></td></tr><tr><td><strong>HDYHAU Non-Compliance</strong></td></tr></table>\"}, {\"id\": \"pv-level1\", \"section\": \"Compliance\", \"icon\": \"\\ud83d\\udd35\", \"title\": \"Protocol Violations \\u2014 Level 1\", \"desc\": \"Low impact. Process corrections.\", \"tag\": \"compliance\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Violation</th><th>Penalty</th></tr><tr><td><strong>Failure to ask discovery questions</strong></td><td rowspan=\\\"4\\\">1st-3rd: Coaching \\u00b7 4th: NTE \\u00b7 5th: Final Warning \\u00b7 6th: 2-Day Suspension \\u00b7 7th: Termination</td></tr><tr><td><strong>HubSpot Availability Non-Compliance</strong></td></tr><tr><td><strong>Failure to tick SMS notification</strong></td></tr><tr><td><strong>Sending Internal Notes as SMS/Email</strong></td></tr></table>\"}, {\"id\": \"qa-guidelines\", \"section\": \"Compliance\", \"icon\": \"\\u2705\", \"title\": \"QA Guidelines\", \"desc\": \"Opening spiel, recap, validation ratings.\", \"tag\": \"compliance\", \"body\": \"<h2>Opening Spiel</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer), this is (Your Name) from Homeaglow calling on a recorded line. I noticed you visited one of our websites or have seen one of our ads. I wanted to call to see how we can help schedule a cleaning for you.</div> <h2>Things to Remember</h2> <ul><li><strong>Membership Fee:</strong> Did agent inform? Did customer understand $59/month ($54/$49)?</li><li><strong>MCT:</strong> Did customer understand 6/5/4 months?</li><li><strong>Schedule of Charges:</strong> First MF charges after initial appointment?</li><li><strong>Cancellation Policy / ETF:</strong> Clear expectations?</li><li><strong>Upcoming Charges:</strong> Pricing, type, date, extra hours?</li><li><strong>Cleaner Rates:</strong> Always use \\\"roughly\\\" or \\\"approximately\\\"</li></ul> <h2>The Recap</h2> <ul><li>All info accurate?</li><li>Terms verbally agreed? (\\\"Is that a clear YES?\\\")</li><li>Terms understood?</li><li>Changes noted in account?</li></ul> <h2>CRM Action</h2><p>Add <code>fcsales_lead</code> to notes. Add <code>do_not_auto_add_alt_start_times</code> if no alternate dates.</p> <div class=\\\"callout red\\\">Incorrect post emails = markdowns and resubmissions with half points.</div> <h2>Validation Ratings</h2> <table class=\\\"kb-table\\\"><tr><th>Rating</th><th>Points</th></tr><tr><td>Valid</td><td>1.1 / 0.8</td></tr><tr><td>Invalid</td><td>0</td></tr><tr><td>Resubmission</td><td>0.55/0.25 and 0.4</td></tr></table>\"}, {\"id\": \"faqs\", \"section\": \"Customer Support\", \"icon\": \"\\ud83d\\udcac\", \"title\": \"FAQs & Objection Handling\", \"desc\": \"Common customer questions with suggested responses.\", \"tag\": \"support\", \"body\": \"<p>Adjust tone to fit conversation. Starting points, not verbatim scripts.</p> <h3>Bank flagged as scam</h3><p>Ask for another card. If none: stay on line while they call bank.</p> <h3>Book for tomorrow?</h3><p>Recommend 2-day window. Slack: cpcalldown_24hoursfromstarttime_jobs.</p> <h3>Cleaners bonded/insured?</h3><p>Independent contractors with certification and background checks.</p> <h3>$23/hr for all future?</h3><p>As low as $23/hr, up to 50% less than local average.</p> <h3>What's included?</h3><p>Surfaces, vacuuming, mopping, sinks/showers/tubs, tidying, garbage.</p> <h3>Cleaner supplies?</h3><p>Bring their own. Customer can request their products.</p> <h3>Late or no-show?</h3><p>24/7 Support. Direct CP contact once claimed.</p> <h3>Same cleaner?</h3><p>Book from dashboard, subject to availability.</p> <h3>Not happy?</h3><p>Team has processes to make it right.</p> <h3>15% transaction fee?</h3><p>Platform upkeep: dashboard, booking, support.</p> <h3>Stuck with contract?</h3><p>Will find a better-fit cleaner.</p> <h3>Choose gender?</h3><p>Can't filter up front. \\\"Report an issue\\\" > \\\"Different cleaner\\\" up to 24hrs before.</p> <h3>Theft?</h3><p>Contact cleaner first. Homeaglow mediates within 30 days.</p> <h3>Referral?</h3><p>Up to $10 after friend's first cleaning. Credit only.</p> <h3>Where located?</h3><p>HQ: Austin TX. Agent: offshore team, pivot to ZIP.</p> <h3>English-speaking?</h3><p>Top-rated local. Future: choose via dashboard.</p> <h3>Pricing?</h3><p>FC: ~$23/hr. Non-member: hourly, 2hr min + 5% fee.</p> <h3>Pay cash?</h3><p>No. Upfront payment required.</p> <h3>NOT included?</h3><p>Exterior windows, deep stains, mold, infestations.</p>\"}, {\"id\": \"csr-inbound\", \"section\": \"Customer Support\", \"icon\": \"\\ud83d\\udcf2\", \"title\": \"Inbound CSR Calls\", \"desc\": \"When a customer service call reaches sales.\", \"tag\": \"support\", \"body\": \"<h2>Option 1 \\u2014 Transfer</h2><p>This is the sales department. Transfer via Transfer button. Callbacks take 24-72 hours.</p> <div class=\\\"callout gold\\\">Do not promise a refund or cancellation outcome.</div> <p><strong>Disposition:</strong> Closed as DNC \\u2192 existing customer.</p> <h2>Option 2 \\u2014 Handle here</h2><p>Help Center: homeaglow.com/help/184. Email: support@homeaglow.com (~24hr response).</p>\"}, {\"id\": \"sms-guide\", \"section\": \"Customer Support\", \"icon\": \"\\u2709\\ufe0f\", \"title\": \"SMS Guide\", \"desc\": \"Moving a sale forward over text.\", \"tag\": \"support\", \"body\": \"<h2>When customer can't talk</h2><p>Don't proactively offer to close over SMS (risks markdown). Ask for callback time first.</p> <h2>Step 1 \\u2014 Send SMS</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Name), I understand that you're not available to talk over the phone at the moment. I don't want you to miss our limited offer, and I'd like to help you book your cleaning appointment the soonest time. If this is more convenient for you, is it okay if we continue this conversation over text?</div> <p>Yes \\u2192 Step 2. No \\u2192 \\\"When can I call you back?\\\"</p> <h2>Step 2 \\u2014 Call flow over text</h2><ul><li>Phase 2: Appointment info, quotes, MF/MCT</li><li>Phase 3: Closing</li><li>Phase 4: Expectations</li><li>Phase 5: Contact info</li></ul> <h2>Step 3 \\u2014 After-sales verbatim</h2><p>Send full script by text. Ask: \\\"Do you understand and agree?\\\" Yes \\u2192 submit.</p> <div class=\\\"callout\\\">If nothing skipped during SMS, no need to call again. Markdown applies if no clear \\\"yes\\\" collected.</div>\"}, {\"id\": \"aftersales-fcf\", \"section\": \"After-Sales\", \"icon\": \"\\u2705\", \"title\": \"After-Sales: FCF (Detailed)\", \"desc\": \"Complete step-by-step after-sales process for FCF/DHJ sales.\", \"tag\": \"aftersales\", \"body\": \"<div class=\\\"callout\\\">Complete this checklist after every FCF or DHJ sale. Do not skip any step.</div>  <h2>Step 1 \\u2014 Update HubSpot Ticket Status</h2> <p>Open the ticket in HubSpot. Click the <strong>Ticket Status</strong> dropdown and select:</p> <div class=\\\"step-box\\\"> <p>\\ud83d\\udccc <strong>Closed as a Sale</strong></p> </div> <p>A <strong>Dependent Properties</strong> panel will appear. Fill in:</p> <table class=\\\"kb-table\\\"> <tr><th>Field</th><th>What to Enter</th></tr> <tr><td>I made a sale and it's a...</td><td><code>first_cleaning_free</code> (for FCF) or <code>DHJ voucher</code></td></tr> <tr><td>First Job Date</td><td>The customer's appointment date (MM/DD/YYYY)</td></tr> <tr><td>Django C ID</td><td>The customer's Django ID number</td></tr> <tr><td>Is this a Gift Card?</td><td>Select the appropriate option</td></tr> </table>  <h2>Step 2 \\u2014 Send Email to Customer on Django</h2> <p>Go to the customer profile in Django. Click the <strong>Post-Book</strong> tab at the top.</p> <div class=\\\"step-box\\\"> <ol> <li>Select <strong>From:</strong> <code>Emma Evans emma@homeaglow.com (833) 265-5215</code></li> <li>Select the customer's email address (radio button)</li> <li>\\u2611\\ufe0f Check <strong>\\\"Notify user via SMS that we responded via email\\\"</strong></li> <li>Set Subject to: <strong>\\\"Your Homeaglow Appointment\\\"</strong></li> <li>Paste the correct email template (see Templates section)</li> <li>Replace all <span class=\\\"hl\\\">highlighted fields</span> with accurate customer info</li> <li>Insert the dashboard link: click <strong>C Do \\u2192 Auto Login \\u2192 Dashboard</strong>, copy the link, paste it into the email</li> <li>Click <strong>Send</strong></li> </ol> </div> <div class=\\\"callout red\\\">Double-check every <span class=\\\"hl\\\">highlighted field</span> before sending. Incorrect post-emails result in markdowns and resubmissions at half points.</div>  <h2>Step 3 \\u2014 Leave Internal Note on Django</h2> <p>Stay on the same customer profile in Django.</p> <div class=\\\"step-box\\\"> <ol> <li>Select the <strong>internal_note</strong> radio button (not the customer email)</li> <li>Paste the internal note template below</li> <li>Fill in all fields accurately</li> <li>Click <strong>Send</strong></li> </ol> </div>  <h3>Internal Note Template (FCF)</h3> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>fcsales_lead Quoted Price Range : $19 - Xhrs FCF Commitment Term: 6 mos. Membership fee amount: $59 1st Appt pricing cohort : (0|0)</div>  <h3>Internal Note Template (DHJ Voucher)</h3> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>fcsales_lead Quoted Price Range : x hr - DHJ Voucher Commitment term : 6 Mos Membership fee amount: $59 1st Appt pricing cohort : (0|0)</div>  <h2>Step 4 \\u2014 Add Flag (if applicable)</h2> <p>If the customer does not want alternate start times, add the flag:</p> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>do_not_auto_add_alt_start_times</div>  <div class=\\\"callout gold\\\">For reduced MF/MCT sales: update the Min Paid Months and Price per Month fields in Django BEFORE sending the email. Go to the customer's FC settings, update Minimum Paid Months (6/5/4) and Price per month ($59/$54/$49), then click Update.</div>\"}, {\"id\": \"aftersales-trial\", \"section\": \"After-Sales\", \"icon\": \"\\ud83e\\uddea\", \"title\": \"After-Sales: Trial (Detailed)\", \"desc\": \"Complete 13-step after-sales walkthrough for Trial Cleaning sales.\", \"tag\": \"aftersales\", \"body\": \"<div class=\\\"callout red\\\">Trial sales require 13 steps. Do them in order. Do not skip any step.</div>  <h2>Step 1 \\u2014 Update HubSpot Ticket</h2> <p>Set Ticket Status \\u2192 <strong>Closed as a Sale</strong>. Fill dependent properties:</p> <table class=\\\"kb-table\\\"> <tr><th>Field</th><th>Value</th></tr> <tr><td>I made a sale and it's a...</td><td><code>trial_cleaning</code></td></tr> <tr><td>First Job Date</td><td>Customer's appointment date</td></tr> <tr><td>Django C ID</td><td>Customer's Django ID</td></tr> </table>  <h2>Step 2 \\u2014 Update Contact Details in HubSpot</h2> <table class=\\\"kb-table\\\"> <tr><th>Field</th><th>Value</th></tr> <tr><td>Did we make a sale</td><td>Yes</td></tr> <tr><td>Sale Type</td><td>Trial</td></tr> <tr><td>Lifecycle Stage</td><td>Customer</td></tr> <tr><td>Contact Owner</td><td>Your name</td></tr> <tr><td>HAG First Job Date</td><td>Appointment date</td></tr> <tr><td>HAG Customer ID</td><td>Django CID</td></tr> <tr><td>Date of Sale</td><td>Today's date in CST timezone</td></tr> </table>  <h2>Step 3 \\u2014 Manual Charge on Django</h2> <p>On Django, go to <strong>DO \\u2192 Charge \\u2192 Create</strong></p> <div class=\\\"step-box\\\"> <ol> <li><strong>Customer ID:</strong> auto-filled</li> <li><strong>Amount:</strong> Enter the total charge amount (e.g. $104.50)</li> <li><strong>Customer Facing Descriptor:</strong> Must start with HOMEAGLOW. Max 22 characters. No internal codes.<br>Format: <code>HOMEAGLOW MM/DD Xhrs</code><br>Example: <code>HOMEAGLOW 9/20 3hrs</code></li> <li><strong>CRM/Agent Facing Descriptor:</strong> Enter <code>Trial_cleaning</code></li> <li>\\u2611\\ufe0f Check <strong>\\\"Auto-Email Customer\\\"</strong></li> <li>Click <strong>Charge Customer</strong></li> </ol> </div>  <h2>Step 4 \\u2014 Invalidate the 0.5hr Voucher</h2> <p>Go to <strong>DO \\u2192 Invalidate</strong></p> <div class=\\\"step-box\\\"> <ol> <li><strong>Voucher Code:</strong> Paste the code of the 0.5-hour voucher issued to the customer</li> <li><strong>\\\"Should we get paid for these vouchers?\\\"</strong> \\u2192 Select <strong>No</strong></li> <li><strong>Top Up Customer Credits To:</strong> <code>$0.00</code></li> <li><strong>\\\"Auto Notify Customer of Credits\\\"</strong> \\u2192 Must be <strong>UNTICKED</strong></li> <li>Click <strong>Invalidate Voucher</strong></li> </ol> </div>  <h2>Step 5 \\u2014 Block Comms</h2> <p>Go to <strong>DO \\u2192 Block comms</strong>. This prevents the system from sending automated messages while you complete the remaining steps.</p>  <h2>Step 6 \\u2014 Issue New Voucher</h2> <p>Go to <strong>DO \\u2192 Voucher \\u2192 Issue</strong></p> <div class=\\\"step-box\\\"> <ol> <li><strong>Number of Hours:</strong> The duration of the job + the Welcome Voucher (e.g. 4 + 0.5 = 4.5 hours)</li> <li><strong>Full internal reason:</strong> <code>Trial_cleaning</code></li> <li><strong>Auto-notify Customer:</strong> Select <strong>\\\"No auto-notification\\\"</strong></li> <li>Click <strong>Issue Voucher</strong></li> <li>\\ud83d\\udccb <strong>Copy the new voucher code</strong> \\u2014 you'll need it for booking</li> </ol> </div>  <h2>Step 7 \\u2014 FC Forced (Trial ONLY)</h2> <p>Click the <strong>voucher ID number</strong> link, scroll down, and <strong>tick \\\"ForeverClean Forced\\\"</strong>.</p> <div class=\\\"step-box\\\"> <table class=\\\"kb-table\\\"> <tr><th>Field</th><th>Value for Trial</th></tr> <tr><td>Monthly price</td><td>$59</td></tr> <tr><td>Free months</td><td>1</td></tr> <tr><td>Months off</td><td>0</td></tr> <tr><td>Cancellation fee min months</td><td>6</td></tr> <tr><td>Cancellation fee</td><td>$99</td></tr> <tr><td>Billed every</td><td>1 month</td></tr> <tr><td>Policy</td><td>99etf</td></tr> </table> </div>  <h2>Step 8 \\u2014 Book the Appointment</h2> <p>Open an <strong>Incognito</strong> window. Go to the customer's dashboard via <strong>C Do \\u2192 Auto Login \\u2192 Dashboard</strong>. Click <strong>Book</strong> and complete the booking using the new voucher.</p>  <h2>Step 9 \\u2014 Cancel the Duplicate 0.5hr Job</h2> <p>Go to <strong>DO \\u2192 Job \\u2192 Cancel</strong></p> <div class=\\\"step-box\\\"> <ol> <li>Under <strong>Recurring Contracts</strong>: Click <strong>\\\"Enable RC Cancellation\\\"</strong>, then tick <strong>\\\"Cancel RC\\\"</strong></li> <li>Under <strong>Jobs</strong>: Tick the duplicate job's checkbox</li> <li>Set <strong>\\\"top up credits to\\\"</strong> = <code>$0</code></li> <li><strong>UNCHECK</strong> \\\"Send C & CP comms about job & RC cancellations\\\"</li> <li>Select reason: <strong>\\\"Customer double booked\\\"</strong></li> <li>Click <strong>Cancel Jobs</strong></li> </ol> </div>  <h2>Step 10 \\u2014 Remove Block Comms</h2> <p>Go to <strong>DO \\u2192 Deactivate \\u2192 Remove Block Comms</strong>. Then clear the action item.</p>  <h2>Step 11 \\u2014 Flag the Sale</h2> <p>On Django, add the sale flag to the customer's profile.</p>  <h2>Step 12 \\u2014 Send Email to Customer</h2> <p>Same process as FCF Step 2:</p> <div class=\\\"step-box\\\"> <ol> <li>Go to <strong>Post-Book</strong> tab</li> <li>From: <strong>Emma Evans</strong></li> <li>Select customer email</li> <li>\\u2611\\ufe0f <strong>Notify user via SMS</strong></li> <li>Subject: <strong>\\\"Your Homeaglow Appointment\\\"</strong></li> <li>Paste the Trial email template, fill in all <span class=\\\"hl\\\">highlighted fields</span></li> <li>Insert dashboard link (<strong>C Do \\u2192 Auto Login \\u2192 Dashboard</strong>)</li> <li>Click <strong>Send</strong></li> </ol> </div>  <h2>Step 13 \\u2014 Leave Internal Note</h2> <p>Select <strong>internal_note</strong>, paste the template, fill in, click <strong>Send</strong>.</p> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>fcsales_lead Quoted Price Range : $xx.xx Commitment term : n/a Membership fee amount: n/a 1st Appt pricing cohort : (20|20)</div>\"}, {\"id\": \"aftersales-otc\", \"section\": \"After-Sales\", \"icon\": \"1\\ufe0f\\u20e3\", \"title\": \"After-Sales: One-Time (Detailed)\", \"desc\": \"Complete 13-step after-sales walkthrough for One-Time Cleaning sales.\", \"tag\": \"aftersales\", \"body\": \"<div class=\\\"callout red\\\">One-Time sales require 13 steps. Same structure as Trial but with key differences marked below.</div>  <h2>Step 1 \\u2014 Update HubSpot Ticket</h2> <p>Ticket Status \\u2192 <strong>Closed as a Sale</strong>. Dependent properties:</p> <table class=\\\"kb-table\\\"> <tr><th>Field</th><th>Value</th></tr> <tr><td>I made a sale and it's a...</td><td><code>one_time_cleaning</code></td></tr> <tr><td>First Job Date</td><td>Appointment date</td></tr> <tr><td>Django C ID</td><td>Customer's Django ID</td></tr> </table>  <h2>Step 2 \\u2014 Update Contact Details in HubSpot</h2> <p>Same fields as Trial, but Sale Type = <strong>OTC</strong>.</p>  <h2>Step 3 \\u2014 Manual Charge on Django</h2> <p><strong>DO \\u2192 Charge \\u2192 Create</strong></p> <div class=\\\"step-box\\\"> <ol> <li><strong>Amount:</strong> The total One-Time charge</li> <li><strong>Customer Facing Descriptor:</strong> <code>HOMEAGLOW MM/DD Xhrs</code></li> <li><strong>CRM Descriptor:</strong> <code>One_time_cleaning</code></li> <li>\\u2611\\ufe0f <strong>\\\"Auto-Email Customer\\\"</strong></li> <li>Click <strong>Charge Customer</strong></li> </ol> </div>  <h2>Step 4 \\u2014 Invalidate 0.5hr Voucher</h2> <p><strong>DO \\u2192 Invalidate</strong>. Same as Trial: paste 0.5 code, select No, $0.00, untick Auto Notify, click Invalidate.</p>  <h2>Step 5 \\u2014 Block Comms</h2> <p><strong>DO \\u2192 Block comms</strong></p>  <h2>Step 6 \\u2014 Issue New Voucher</h2> <p><strong>DO \\u2192 Voucher \\u2192 Issue</strong>. Hours = job duration + 0.5. Internal reason: <code>One_time_cleaning</code>. No auto-notification. Copy the new voucher code.</p>  <h2>Step 7 \\u2014 FC Forced</h2> <div class=\\\"callout red\\\">\\u26a0\\ufe0f For One-Time: leave ALL ForeverClean Forced fields BLANK. Do NOT tick \\\"ForeverClean Forced.\\\" This is the key difference from Trial.</div>  <h2>Step 8 \\u2014 Book the Appointment</h2> <p>Incognito \\u2192 customer dashboard via <strong>C Do \\u2192 Auto Login \\u2192 Dashboard</strong> \\u2192 Book using new voucher.</p>  <h2>Step 9 \\u2014 Cancel the Duplicate 0.5hr Job</h2> <p><strong>DO \\u2192 Job \\u2192 Cancel</strong></p> <div class=\\\"step-box\\\"> <ol> <li>Enable RC Cancellation \\u2192 tick Cancel RC</li> <li>Tick the duplicate job's checkbox</li> <li>Credits = <code>$0</code></li> <li><strong>UNCHECK</strong> \\\"Send C & CP comms\\\"</li> <li>Reason: <strong>\\\"Customer double booked\\\"</strong></li> <li>Click <strong>Cancel Jobs</strong></li> </ol> </div>  <h2>Step 10 \\u2014 Remove Block Comms</h2> <p><strong>DO \\u2192 Deactivate \\u2192 Remove Block Comms</strong>. Clear the action item.</p>  <h2>Step 11 \\u2014 Flag the Sale</h2> <p>Add sale flag to customer profile.</p>  <h2>Step 12 \\u2014 Send Email to Customer</h2> <p>Post-Book tab \\u2192 From: Emma Evans \\u2192 customer email \\u2192 \\u2611\\ufe0f Notify SMS \\u2192 Subject: \\\"Your Homeaglow Appointment\\\" \\u2192 paste One-Time email template \\u2192 fill <span class=\\\"hl\\\">highlighted fields</span> \\u2192 insert dashboard link \\u2192 Send.</p>  <h2>Step 13 \\u2014 Leave Internal Note</h2> <p>Select internal_note, paste template, fill in, Send.</p> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>fcsales_lead One-Time Cleaning Quoted Price : $xx.xx Cleaning Duration: X-hours Did we negotiate FC: Y/N Appt pricing cohort : (30|30)</div>  <div class=\\\"callout gold\\\">For OTC leads from the 25|25 cohort, use <code>(25|25)</code> instead of <code>(30|30)</code> in the internal note.</div>\"}]");

function loadPages(){try{var s=localStorage.getItem("kb_pages");if(s)return JSON.parse(s);}catch(e){}return null;}
function savePages(p){localStorage.setItem("kb_pages",JSON.stringify(p));}
function getPages(){return loadPages()||DEFAULT_PAGES.slice();}

var adminMode=false,activeCat="all";
var homeGrid,pageView,searchInput,catTabs,editOverlay,editModal;

var sectionOrder=["Training","Tools & Systems","After-Sales","Compliance","Templates","Customer Support"];
var tagMap={"Training":"training","Tools & Systems":"tools","After-Sales":"aftersales","Compliance":"compliance","Templates":"templates","Customer Support":"support"};
var tagClass={"training":"tag-training","tools":"tag-tools","aftersales":"tag-aftersales","compliance":"tag-compliance","templates":"tag-templates","support":"tag-support"};
var sectionColors={"Training":"#16A34A","Tools & Systems":"#2563EB","After-Sales":"#EA580C","Compliance":"#DC2626","Templates":"#D97706","Customer Support":"#7C3AED"};

function renderHome(filter,cat){
  filter=filter||"";cat=cat||"all";
  var pages=getPages(),ft=filter.trim().toLowerCase();
  var filtered=pages;
  if(ft)filtered=filtered.filter(function(p){return p.title.toLowerCase().indexOf(ft)>=0||p.desc.toLowerCase().indexOf(ft)>=0||p.body.toLowerCase().indexOf(ft)>=0;});
  if(cat!=="all")filtered=filtered.filter(function(p){return p.tag===cat;});
  if(!filtered.length){homeGrid.innerHTML="<div class='no-results'>No results found.</div>";return;}
  var h="";
  sectionOrder.forEach(function(sec){
    var sp=filtered.filter(function(p){return p.section===sec;});
    if(!sp.length)return;
    h+="<div class='section-label'><span class='dot' style='background:"+(sectionColors[sec]||"#888")+"'></span>"+sec+"</div><div class='card-grid'>";
    sp.forEach(function(p){
      h+="<div class='card' data-cat='"+p.tag+"' onclick=\"showPage('"+p.id+"')\">";
      h+="<button class='card-edit-btn' onclick=\"event.stopPropagation();openEditor('"+p.id+"')\">&#9999;&#65039;</button>";
      h+="<span class='card-icon'>"+p.icon+"</span>";
      h+="<div class='card-title'>"+p.title+"</div>";
      h+="<div class='card-desc'>"+p.desc+"</div>";
      h+="<span class='card-tag "+(tagClass[p.tag]||"")+"'>"+p.section+"</span></div>";
    });
    h+="</div>";
  });
  h+="<div class='add-card' onclick='openEditor(null)'>+ Add New Page</div>";
  homeGrid.innerHTML=h;
}

function showPage(id){
  var p=getPages().find(function(x){return x.id===id;});if(!p)return;
  document.body.classList.add("showing-page");
  pageView.innerHTML="<span class='pv-tag "+(tagClass[p.tag]||"")+"'>"+p.section+"</span>"+
    "<h1 class='pv-h1'>"+p.icon+" "+p.title+"</h1>"+
    "<p class='pv-sub'>"+p.desc+"</p>"+
    "<div class='pv-body'>"+p.body+"</div>";
  window.scrollTo(0,0);
}

function goHome(){document.body.classList.remove("showing-page");renderHome(searchInput.value,activeCat);window.scrollTo(0,0);}

function requestMgr(){
  if(adminMode){adminMode=false;document.body.classList.remove("admin-on");document.getElementById("mgrBtn").classList.remove("on");document.getElementById("mgrBtn").innerHTML="&#128274; Manager";renderHome(searchInput.value,activeCat);return;}
  document.getElementById("pwOverlay").classList.add("show");document.getElementById("pwInput").value="";document.getElementById("pwInput").focus();document.getElementById("pwErr").style.display="none";
}

function checkPw(){
  if(document.getElementById("pwInput").value===MGR_PW){
    document.getElementById("pwOverlay").classList.remove("show");
    adminMode=true;document.body.classList.add("admin-on");
    document.getElementById("mgrBtn").classList.add("on");document.getElementById("mgrBtn").innerHTML="&#128275; Editing";
    renderHome(searchInput.value,activeCat);
  }else{document.getElementById("pwErr").style.display="block";}
}

function openEditor(id){
  var pages=getPages();
  var p=id?pages.find(function(x){return x.id===id;}):null;
  var sects="";
  sectionOrder.forEach(function(s){sects+="<option value='"+s+"' "+(p&&p.section===s?"selected":"")+">"+s+"</option>";});
  var delBtn=p?"<button class='btn-delete' onclick=\"deletePage('"+p.id+"')\">Delete</button>":"";
  var saveId=id||"";
  editModal.innerHTML="<h2>"+(p?"Edit Page":"New Page")+"</h2>"+
    "<label>Title</label><input id='ed-title' value='"+(p?p.title.replace(/'/g,"&#39;"):"")+"'>"+
    "<label>Icon (emoji)</label><input id='ed-icon' value='"+(p?p.icon:"&#128196;")+"' maxlength='4'>"+
    "<label>Description</label><input id='ed-desc' value='"+(p?p.desc.replace(/'/g,"&#39;"):"")+"'>"+
    "<label>Section</label><select id='ed-section'>"+sects+"</select>"+
    "<label>Content (HTML)</label><textarea id='ed-body'>"+(p?p.body.replace(/</g,"&lt;").replace(/>/g,"&gt;"):"")+"</textarea>"+
    "<div class='edit-hint'>HTML tags: h2, h3, p, ul/li, table.kb-table, div.callout, div.copy-block</div>"+
    "<div class='edit-btns'>"+delBtn+
    "<button class='btn-cancel' onclick='closeEditor()'>Cancel</button>"+
    "<button class='btn-save' onclick=\"savePage('"+saveId+"')\">Save</button></div>";
  editOverlay.classList.add("show");
}
function closeEditor(){editOverlay.classList.remove("show");}
function savePage(id){
  var pages=getPages();
  var t=document.getElementById("ed-title").value.trim();
  var ic=document.getElementById("ed-icon").value.trim()||"📄";
  var d=document.getElementById("ed-desc").value.trim();
  var sec=document.getElementById("ed-section").value;
  var b=document.getElementById("ed-body").value;
  var tag=tagMap[sec]||"training";
  if(!t){alert("Title required");return;}
  if(id){var idx=-1;for(var i=0;i<pages.length;i++){if(pages[i].id===id){idx=i;break;}}
    if(idx>=0){pages[idx].title=t;pages[idx].icon=ic;pages[idx].desc=d;pages[idx].section=sec;pages[idx].tag=tag;pages[idx].body=b;}}
  else{pages.push({id:"page_"+Date.now(),section:sec,icon:ic,title:t,desc:d,tag:tag,body:b});}
  savePages(pages);closeEditor();renderHome(searchInput.value,activeCat);
}
function deletePage(id){if(!confirm("Delete this page?"))return;var p=getPages().filter(function(x){return x.id!==id;});savePages(p);closeEditor();renderHome(searchInput.value,activeCat);}

function copyBlock(el){
  var btn=el.querySelector(".copy-btn");
  var text=el.innerText.replace(/^Copy\s*/,"").trim();
  navigator.clipboard.writeText(text).then(function(){btn.textContent="Copied!";btn.classList.add("copied");setTimeout(function(){btn.textContent="Copy";btn.classList.remove("copied");},1500);});
}


document.addEventListener("DOMContentLoaded",function(){
  homeGrid=document.getElementById("homeGrid");
  pageView=document.getElementById("pageView");
  searchInput=document.getElementById("searchInput");
  catTabs=document.getElementById("catTabs");
  editOverlay=document.getElementById("editOverlay");
  editModal=document.getElementById("editModal");

  searchInput.addEventListener("input",function(){if(document.body.classList.contains("showing-page"))goHome();renderHome(searchInput.value,activeCat);});
  catTabs.addEventListener("click",function(e){var tab=e.target.closest(".cat-tab");if(!tab)return;activeCat=tab.dataset.filter;catTabs.querySelectorAll(".cat-tab").forEach(function(t){t.classList.toggle("active",t===tab);});renderHome(searchInput.value,activeCat);});
  document.addEventListener("keydown",function(e){if(e.key==="Escape"){if(editOverlay.classList.contains("show"))closeEditor();else if(document.getElementById("pwOverlay").classList.contains("show"))document.getElementById("pwOverlay").classList.remove("show");else if(document.body.classList.contains("showing-page"))goHome();}});
  editOverlay.addEventListener("click",function(e){if(e.target===editOverlay)closeEditor();});
  document.getElementById("pwOverlay").addEventListener("click",function(e){if(e.target.id==="pwOverlay")e.target.classList.remove("show");});

  renderHome();
});
</script>
</body>
</html>
