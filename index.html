<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ConvEx — Agent Handbook</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
--bg:#F8F7F4;--surface:#FFFFFF;--surface2:#F1F0EB;--surface3:#E8E7E2;
--ink:#1B1B1F;--ink2:#3F3F46;--ink-soft:#71717A;--ink-muted:#A1A1AA;
--border:#DDDCD7;--border2:#CCCBC6;
--navy:#1E3A5F;--gold:#C5A44E;--gold-soft:#FAF6EA;--gold-border:#E5D5A0;
--green:#16A34A;--green-soft:#F0FDF4;--blue:#2563EB;--blue-soft:#EFF6FF;
--red:#DC2626;--red-soft:#FEF2F2;--purple:#7C3AED;--purple-soft:#F5F3FF;
--amber:#D97706;--amber-soft:#FFFBEB;--orange:#EA580C;--orange-soft:#FFF7ED;
--teal:#0D9488;--teal-soft:#F0FDFA;
--radius:14px;--radius-sm:8px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
a{color:var(--navy);text-decoration:underline;text-underline-offset:2px;}
a:hover{color:var(--gold);}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:var(--navy);padding:0 28px;display:flex;align-items:center;gap:16px;height:56px;}
.topbar-logo img{height:30px;display:block;}
.topbar-search{flex:1;max-width:280px;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.15);border-radius:var(--radius-sm);padding:8px 14px;font-size:13.5px;color:#fff;font-family:inherit;outline:none;transition:all 0.15s;}
.topbar-search:focus{background:rgba(255,255,255,0.2);border-color:var(--gold);}
.topbar-search::placeholder{color:rgba(255,255,255,0.45);}
.search-icon{font-size:18px;line-height:1;filter:brightness(0) invert(1) opacity(0.75);}
.topbar-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;justify-content:center;align-items:center;}
.homeaglow-logo{height:22px;opacity:0.95;}
.topbar-back{display:none;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;border-radius:var(--radius-sm);padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.12s;}
.topbar-back:hover{background:rgba(255,255,255,0.2);}
.showing-page .topbar-back{display:block;}
.mgr-btn{margin-left:auto;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);border-radius:var(--radius-sm);padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;}
.mgr-btn:hover{background:rgba(255,255,255,0.15);color:#fff;}
.mgr-btn.on{background:var(--gold-soft);color:var(--gold);border-color:var(--gold-border);}

/* HERO */
.hero{padding:16px 24px 4px;max-width:800px;margin:0 auto;text-align:center;}
.hero-logo{margin-bottom:0px;}
.hero-logo img{height:82px;}
.hero h1{font-size:28px;font-weight:700;letter-spacing:-0.03em;color:var(--ink);}
.hero p{color:var(--ink-soft);font-size:14px;margin-top:8px;line-height:1.6;}
.showing-page .hero{display:none;}

/* TABS */
.cat-tabs{display:flex;gap:6px;justify-content:center;padding:18px 24px 6px;flex-wrap:wrap;}
.showing-page .cat-tabs{display:none;}
.cat-tab{padding:7px 16px;border-radius:20px;font-size:12.5px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:#fff;color:var(--ink-soft);transition:all 0.15s;position:relative;}
.cat-tab-add{display:none;background:var(--gold-soft);border-color:var(--gold-border);color:var(--gold);border-style:dashed;}
.admin-on .cat-tab-add{display:inline-block;}
.cat-tab-del{display:none;background:transparent;border:none;color:currentColor;font-size:14px;font-weight:700;cursor:pointer;padding:0 0 0 8px;margin:0;line-height:1;opacity:0.55;font-family:inherit;}
.cat-tab-del:hover{opacity:1;color:#DC2626;}
.admin-on .cat-tab-del{display:inline;}
.cat-tab:hover{background:var(--surface2);color:var(--ink2);border-color:var(--border2);transform:translateY(-1px);}
.cat-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* HOME GRID */
.home{padding:14px 24px 50px;max-width:960px;margin:0 auto;}
.showing-page .home{display:none;}
.section-label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;margin:24px 0 10px 4px;display:flex;align-items:center;gap:8px;color:var(--ink-soft);}
.section-label .dot{width:7px;height:7px;border-radius:50%;}
.section-label:first-child{margin-top:4px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}

.card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:20px 18px 16px;cursor:pointer;transition:all 0.18s;position:relative;}
.card:hover{border-color:var(--gold);box-shadow:0 4px 16px rgba(30,58,95,0.06),0 0 0 2px var(--gold-soft);transform:translateY(-2px);}
.card-icon{font-size:26px;margin-bottom:10px;display:block;}
.card-title{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.3;color:var(--ink);}
.card-desc{font-size:12px;color:var(--ink-soft);line-height:1.5;}
.card-tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:0.06em;padding:3px 8px;border-radius:5px;margin-top:10px;text-transform:uppercase;}
.tag-training{background:var(--green-soft);color:var(--green);}
.tag-tools{background:var(--blue-soft);color:var(--blue);}
.tag-aftersales{background:var(--orange-soft);color:var(--orange);}
.tag-compliance{background:var(--red-soft);color:var(--red);}
.tag-templates{background:var(--amber-soft);color:var(--amber);}
.tag-support{background:var(--purple-soft);color:var(--purple);}
.tag-booking{background:var(--teal-soft);color:var(--teal);}

.card-edit-btn{display:none;position:absolute;top:8px;right:8px;background:var(--gold-soft);border:1px solid var(--gold-border);color:var(--gold);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.admin-on .card-edit-btn{display:block;}
.card-move-btns{display:none;position:absolute;top:8px;left:8px;flex-direction:column;gap:2px;}
.admin-on .card-move-btns{display:flex;}
.card-move-btn{background:var(--surface2);border:1px solid var(--border2);color:var(--ink-soft);border-radius:5px;width:20px;height:16px;font-size:9px;line-height:1;cursor:pointer;font-family:inherit;padding:0;}
.card-move-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy);}
.card-move-btn:disabled{opacity:0.3;cursor:default;}
.card-move-btn:disabled:hover{background:var(--surface2);color:var(--ink-soft);border-color:var(--border2);}
.add-card{background:var(--surface2);border:2px dashed var(--border);border-radius:var(--radius);padding:28px;cursor:pointer;display:none;text-align:center;color:var(--ink-muted);font-size:13px;font-weight:600;transition:all 0.15s;}
.add-card:hover{border-color:var(--gold);color:var(--gold);background:var(--gold-soft);}
.admin-on .add-card{display:block;}

/* PAGE VIEW */
.page-view{display:none;padding:32px 24px 80px;max-width:740px;margin:0 auto;animation:fadeUp 0.2s ease;}
.showing-page .page-view{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

.pv-tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:5px;margin-bottom:14px;}
.pv-h1{font-size:26px;font-weight:700;letter-spacing:-0.02em;line-height:1.2;margin-bottom:6px;}
.pv-sub{font-size:14px;color:var(--ink-soft);margin-bottom:28px;line-height:1.6;}

.pv-body h2{font-size:17px;font-weight:700;margin:28px 0 10px;padding-bottom:8px;border-bottom:1.5px solid var(--border);color:var(--navy);}
.pv-body h3{font-size:13.5px;font-weight:700;margin:18px 0 6px;color:var(--gold);}
.pv-body p{font-size:13.5px;line-height:1.8;color:var(--ink2);margin-bottom:10px;}
.pv-body ul,.pv-body ol{font-size:13.5px;line-height:1.8;padding-left:20px;margin-bottom:12px;color:var(--ink2);}
.pv-body li{margin-bottom:4px;}
.pv-body strong{color:var(--ink);font-weight:700;}
.pv-body code{background:var(--surface2);padding:2px 7px;border-radius:4px;font-size:12px;font-family:monospace;color:var(--navy);}

.pv-body .callout{background:var(--surface2);border-left:3px solid var(--navy);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 16px;font-size:13px;margin:14px 0;line-height:1.7;color:var(--ink2);}
.pv-body .callout.gold{border-left-color:var(--gold);background:var(--gold-soft);}
.pv-body .callout.red{border-left-color:var(--red);background:var(--red-soft);}

.pv-body table.kb-table{width:100%;border-collapse:collapse;margin:12px 0 16px;font-size:13px;border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;}
.pv-body table.kb-table th,.pv-body table.kb-table td{border:1px solid var(--border);padding:8px 12px;text-align:left;}
.pv-body table.kb-table th{background:var(--navy);color:#fff;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;}

/* Highlighted fields in templates */
.hl{background:#DBEAFE;color:#1E40AF;padding:1px 5px;border-radius:3px;font-weight:600;}

/* Step boxes */
.step-box{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin:10px 0;font-size:13px;line-height:1.7;}
.step-box ol{padding-left:18px;}

/* Copyable blocks */
.copy-block{position:relative;background:#fff;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px 60px 14px 14px;margin:12px 0;font-size:12.5px;line-height:1.7;color:var(--ink2);white-space:pre-wrap;font-family:inherit;}
.copy-block-small{margin:6px 0 18px;padding:8px 60px 8px 12px;font-size:12px;color:var(--ink-soft);background:var(--surface2);border-style:dashed;}
.copy-btn{position:absolute;top:8px;right:8px;background:var(--navy);border:none;border-radius:5px;padding:4px 10px;font-size:10px;font-weight:700;cursor:pointer;color:#fff;font-family:inherit;transition:all 0.12s;}
.copy-btn:hover{background:var(--gold);}
.copy-btn.copied{background:var(--green);}

/* Template dropdown */
.tpl-select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;color:var(--ink);background:#fff;margin:8px 0 12px;cursor:pointer;transition:border-color 0.15s;}
.tpl-select:hover{border-color:var(--gold);}
.tpl-select:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,95,0.08);}

/* Edit modal */
.edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;}
.edit-overlay.show{display:flex;}
.edit-modal{background:#fff;border-radius:var(--radius);padding:24px;width:90%;max-width:680px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.edit-modal h2{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--navy);}
.edit-modal label{display:block;font-size:11px;font-weight:600;color:var(--ink-soft);margin:10px 0 4px;text-transform:uppercase;letter-spacing:0.05em;}
.edit-modal input,.edit-modal textarea,.edit-modal select{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;}
.edit-modal input:focus,.edit-modal textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(30,58,95,0.08);}
.edit-modal textarea{min-height:220px;resize:vertical;}
.edit-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end;}
.edit-btns button{padding:8px 18px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;border:none;}
.btn-save{background:var(--navy);color:#fff;}
.btn-save:hover{background:#152D4A;}
.btn-cancel{background:var(--surface2);color:var(--ink2);border:1.5px solid var(--border);}
.btn-delete{background:var(--red-soft);color:var(--red);border:1.5px solid #FCA5A5;}
.edit-hint{font-size:10px;color:var(--ink-muted);margin-top:4px;line-height:1.5;}

/* Password modal */
.pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;}
.pw-overlay.show{display:flex;}
.pw-box{background:#fff;border-radius:var(--radius);padding:28px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.15);}
.pw-box h3{font-size:16px;margin-bottom:4px;color:var(--navy);}
.pw-box p{font-size:12px;color:var(--ink-soft);margin-bottom:14px;}
.pw-box input{width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;text-align:center;font-family:inherit;outline:none;}
.pw-box input:focus{border-color:var(--navy);}
.pw-box button{margin-top:12px;padding:9px 28px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.pw-err{color:var(--red);font-size:12px;margin-top:8px;display:none;}

.no-results{text-align:center;padding:60px 20px;color:var(--ink-muted);font-size:14px;}
.site-footer{text-align:center;padding:28px 20px;color:var(--ink-muted);font-size:10.5px;border-top:1px solid var(--border);}
.showing-page .site-footer{display:none;}

@media(max-width:640px){
.topbar{padding:0 14px;height:48px;gap:8px;}.topbar-logo img{height:24px;}.hero{padding:28px 16px 2px;}.hero h1{font-size:22px;}.hero-logo img{height:40px;}.home{padding:10px 14px 40px;}.card-grid{grid-template-columns:1fr;}.page-view{padding:20px 14px 60px;}.pv-h1{font-size:20px;}.cat-tabs{padding:12px 14px 2px;}.edit-modal{padding:18px;width:95%;}
}
</style>
</head>

var DEFAULT_PAGES=JSON.parse("[{\"id\": \"fcf-overview\", \"section\": \"Training\", \"icon\": \"📋\", \"title\": \"Understanding FCF\", \"desc\": \"Membership positioning, free cleaning benefits, and full booking process.\", \"tag\": \"training\", \"body\": \"<h2>What is ForeverClean?</h2> <p>ForeverClean (FCF) is a membership-based cleaning program offering discounted cleaning services at affordable rates. Customers begin by activating their ForeverClean membership and using their free first cleaning benefit. The membership activates immediately after enrollment.</p> <h3>What's Included</h3> <ul><li>Discounted future cleaning rates (approx. $23/hr)</li><li>Access to recurring cleaning services</li><li>Dashboard access for booking management</li><li>Flexible scheduling options</li><li>24/7 customer support</li></ul> <h3>Standard Cleaning Covers</h3> <p>Cleaning supplies including vacuum, kitchen cleaning, bedroom cleaning, bathroom cleaning, dusting, vacuuming, and mopping.</p> <h3>Premium Tasks (+1 hour each)</h3> <p>Oven cleaning, refrigerator cleaning, interior windows, baseboards, laundry, cabinets.</p> <h3>Not Covered</h3> <p>Heavy lifting, outdoor work, carpet shampooing, mold removal, deep stain removal, pet waste cleaning.</p> <h2>Time Recommendation Table</h2> <table class=\\\"kb-table\\\"><tr><th>Hours</th><th>Kitchen</th><th>Bathrooms</th><th>Bedrooms</th></tr><tr><td>2 hr</td><td>Yes</td><td>1</td><td>0</td></tr><tr><td>3 hr</td><td>Yes</td><td>1</td><td>1</td></tr><tr><td>4 hr</td><td>Yes</td><td>2</td><td>1-2</td></tr><tr><td>6 hr</td><td>Yes</td><td>3+</td><td>3+</td></tr></table> <div class=\\\"callout\\\">Recommended package: 6-hour cleaning.</div> <h2>Negotiation Levers: MF &amp; MCT</h2> <table class=\\\"kb-table\\\"><tr><th>Monthly Fee</th><th>MCT</th></tr><tr><td>$59 — No Change</td><td>6 Months — No Change</td></tr><tr><td>$54 — $5 Off</td><td>5 Months — Reduce by 1</td></tr><tr><td>$49 — $10 Off</td><td>4 Months — Reduce by 2</td></tr></table> <p>Only adjust when there is a clear customer objection or budget concern.</p> <h2>How to Book</h2> <ol><li>Set up customer account using Incognito Mode</li><li>Collect all required info (name, ZIP, phone, email, card)</li><li>Explain membership fees and terms clearly</li><li>Confirm customer understands all terms</li><li>Verify all details before finalizing</li></ol> <h3>Cleaning Notes 101</h3> <p>Always include: priority areas, preferences, pet info, entry instructions, areas to avoid.</p> <div class=\\\"callout gold\\\">ETF applies if cancelled before 6 paid months. Formula: $35 × number of initial cleaning hours.</div>\"}, {\"id\": \"types-of-cleanings\", \"section\": \"Training\", \"icon\": \"🧹\", \"title\": \"Types of Cleanings\", \"desc\": \"Standard, deep, and move-out cleaning explained.\", \"tag\": \"training\", \"body\": \"{{IMG:Tools_22}}<h2>Overview</h2> <p>Customers booking cleanings on our website have different needs or tasks that they need help with. While they are encouraged to include Cleaning Notes in their requests, certain tasks are automatically included and are expected to be fulfilled by their cleaner (Standard Cleaning).</p>  <h2>Standard Cleaning</h2> <p>Standard cleaning refers to the regular, routine cleaning tasks that maintain a home or office in a clean and orderly condition. Unlike deep cleaning, which involves more intensive cleaning tasks, standard cleaning focuses on day-to-day upkeep.</p> <p>Standard cleanings typically include the following tasks:</p> <ul> <li><strong>Dusting:</strong> Light dusting of surfaces, including furniture, shelves, and electronics</li> <li><strong>Vacuuming:</strong> Regular vacuuming of carpets, rugs, and upholstered furniture</li> <li><strong>Sweeping and Mopping:</strong> Sweeping and mopping hard floors (e.g., tile, wood, etc.)</li> <li><strong>Kitchen Cleaning:</strong> Wiping down countertops, cleaning sinks, and occasionally cleaning appliances' surfaces</li> <li><strong>Bathroom Cleaning:</strong> Spot-cleaning sinks, toilets, and mirrors; and wiping down surfaces</li> <li><strong>Trash Removal:</strong> Emptying trash bins and replacing filters</li> <li><strong>General Tidying:</strong> Organizing items and tidying up spaces to keep them neat</li> </ul>  <h2>Deep Cleaning</h2> <div class=\\\"callout red\\\">NOTE: Cleaners do not offer most of the services listed under Deep Cleaning. Unless the customer specifies otherwise, they are only expected to do standard cleaning and a few other Premium Services listed on our website. DO NOT offer deep cleaning services.</div> <p>Deep cleaning goes beyond the regular maintenance of standard cleaning by addressing areas that aren't typically covered in routine cleaning. It's a more thorough process designed to tackle accumulated dirt, grime, and stains that regular cleaning might miss.</p> <p>Since deep cleanings require more time and attention to detail than standard cleanings, customers are advised to book more hours to give their cleaners enough time to complete their required tasks.</p> <p>Deep cleanings typically involve:</p> <ul> <li><strong>Detailed Dusting:</strong> Dusting hard-to-reach areas like ceiling fans, light fixtures, and behind appliances</li> <li><strong>Scrubbing and Sanitizing:</strong> Cleaning and sanitizing areas that require more effort, such as grout lines in tile, behind and underneath appliances, and inside cabinets and drawers</li> <li><strong>Carpet and Upholstery Cleaning:</strong> Shampooing or steam cleaning carpets and upholstery to remove deep-set stains and dirt</li> <li><strong>Window Washing:</strong> Cleaning both the inside and outside of windows, including frames and sills</li> <li><strong>Cleaning Air Vents and Ducts:</strong> Removing dust and debris from air vents and HVAC ducts</li> <li><strong>Kitchen Deep Clean:</strong> Thoroughly cleaning inside the oven, refrigerator, and microwave; and removing buildup from cabinets and countertops</li> <li><strong>Bathroom Deep Clean:</strong> Deep scrubbing of shower tiles, removing limescale and soap scum, and cleaning behind fixtures</li> <li><strong>Wall and Baseboard Cleaning:</strong> Washing walls to remove scuff marks and cleaning baseboards</li> <li><strong>Detailing:</strong> Paying attention to small details like cleaning light switches, door handles, and vents</li> </ul> <p>Deep cleaning is often done periodically, such as seasonally or annually, or before moving in or out of a home. It helps maintain a high standard of cleanliness and can improve the overall hygiene and appearance of a space.</p>  <h2>Move-Out Cleaning</h2> <p>A move-out clean is a thorough cleaning process typically done when someone is vacating a property. It ensures the space is left in excellent condition for the next occupant or for the landlord to inspect.</p> <p>Move-out cleans typically involve:</p> <ul> <li><strong>Dusting and Wiping Surfaces:</strong> Cleaning all surfaces, including shelves, countertops, and baseboards, to remove dust and grime</li> <li><strong>Deep Cleaning of Appliances:</strong> Cleaning inside and outside of appliances like ovens, refrigerators, and microwaves</li> <li><strong>Bathroom Sanitization:</strong> Scrubbing toilets, showers, sinks, and floors, and polishing mirrors</li> <li><strong>Floor Cleaning:</strong> Vacuuming carpets and mopping hard floors</li> <li><strong>Window and Glass Cleaning:</strong> Washing windows, mirrors, and any glass surfaces</li> <li><strong>Removing Trash and Debris:</strong> Ensuring all trash is removed and any leftover items are disposed of or returned</li> </ul>\"}, {\"id\": \"trial-onetime\", \"section\": \"Training\", \"icon\": \"🧪\", \"title\": \"Trial & One-Time Cleaning\", \"desc\": \"When membership isn't ideal — offer these alternatives.\", \"tag\": \"training\", \"body\": \"<h2>Trial Cleaning</h2> <p>30-day FC membership trial, no commitment. Cancel within 30 days.</p> <ul><li>After 30 days: auto-begins at $59/month</li><li>Rates at approx. $23/hr (includes 15% transaction fee)</li><li>Cancelling after trial: $99 termination fee</li></ul> <h2>One-Time Cleaning</h2> <p>Single cleaning, no commitment. Pay once, no membership.</p> <h2>How to Book</h2> <ol><li>Incognito → homeaglow.com/customer/choosedate</li><li>Enter ZIP, date/time, hours</li><li>Enter email → \\\"See available Cleaners\\\"</li><li>\\\"Got it\\\" on 0.5hr voucher (invalidate unless customer knows)</li><li>Contact info + payment → \\\"I agree, Get Clean!\\\"</li><li>Cleaning notes, pets, entry, extras → Submit</li><li>Close incognito → after-sales</li></ol> <div class=\\\"callout gold\\\">Trial FC Forced: monthly $59, free months 1, months off 0, cancel fee min 6mo, fee $99, billed every 1, policy 99etf. One-Time: ALL fields blank.</div>\"}, {\"id\": \"fcf-pricing-job-aid\", \"section\": \"Training\", \"icon\": \"💰\", \"title\": \"FCF Pricing Job Aid\", \"desc\": \"Quick-reference pricing matrix for FCF membership, Trial, and One-Time.\", \"tag\": \"training\", \"body\": \"<div class=\\\"callout\\\">Use this job aid to quote pricing for the ForeverClean (FCF) membership flow. This is not the DHJ voucher path. For DHJ voucher pricing and ETF, see the Understanding FCF page and Templates section.</div><h2>How to Read This Table</h2><p>Cost per Cleaning is the customer's cleaning rate at roughly $23/hour. The Membership Fee (MF) columns show the total charged per cleaning cycle once the $59, $54, or $49 monthly fee is factored in. Use the MF columns as negotiation levers only when there is a clear customer objection or budget concern.</p><h2>FC Membership Pricing by Hours</h2><h3>2-Hour Cleaning</h3><table class=\\\"kb-table\\\"><tr><th>Frequency</th><th>Cost per Cleaning</th><th>w/ $59 MF</th><th>w/ $54 MF</th><th>w/ $49 MF</th></tr><tr><td>Once a month</td><td>$46.00</td><td>$105.00</td><td>$100.00</td><td>$95.00</td></tr><tr><td>Twice per month</td><td>$46.00</td><td>$151.00</td><td>$146.00</td><td>$141.00</td></tr><tr><td>3x per month</td><td>$46.00</td><td>$197.00</td><td>$192.00</td><td>$187.00</td></tr><tr><td>Weekly</td><td>$46.00</td><td>$243.00</td><td>$238.00</td><td>$233.00</td></tr></table><h3>3-Hour Cleaning</h3><table class=\\\"kb-table\\\"><tr><th>Frequency</th><th>Cost per Cleaning</th><th>w/ $59 MF</th><th>w/ $54 MF</th><th>w/ $49 MF</th></tr><tr><td>Once a month</td><td>$69.00</td><td>$128.00</td><td>$123.00</td><td>$118.00</td></tr><tr><td>Twice per month</td><td>$69.00</td><td>$197.00</td><td>$192.00</td><td>$187.00</td></tr><tr><td>3x per month</td><td>$69.00</td><td>$266.00</td><td>$261.00</td><td>$256.00</td></tr><tr><td>Weekly</td><td>$69.00</td><td>$335.00</td><td>$330.00</td><td>$325.00</td></tr></table><h3>4-Hour Cleaning</h3><table class=\\\"kb-table\\\"><tr><th>Frequency</th><th>Cost per Cleaning</th><th>w/ $59 MF</th><th>w/ $54 MF</th><th>w/ $49 MF</th></tr><tr><td>Once a month</td><td>$92.00</td><td>$151.00</td><td>$146.00</td><td>$141.00</td></tr><tr><td>Twice per month</td><td>$92.00</td><td>$243.00</td><td>$238.00</td><td>$233.00</td></tr><tr><td>3x per month</td><td>$92.00</td><td>$335.00</td><td>$330.00</td><td>$325.00</td></tr><tr><td>Weekly</td><td>$92.00</td><td>$427.00</td><td>$422.00</td><td>$417.00</td></tr></table><h3>5-Hour Cleaning</h3><table class=\\\"kb-table\\\"><tr><th>Frequency</th><th>Cost per Cleaning</th><th>w/ $59 MF</th><th>w/ $54 MF</th><th>w/ $49 MF</th></tr><tr><td>Once a month</td><td>$115.00</td><td>$174.00</td><td>$169.00</td><td>$164.00</td></tr><tr><td>Twice per month</td><td>$115.00</td><td>$289.00</td><td>$284.00</td><td>$279.00</td></tr><tr><td>3x per month</td><td>$115.00</td><td>$404.00</td><td>$399.00</td><td>$394.00</td></tr><tr><td>Weekly</td><td>$115.00</td><td>$519.00</td><td>$514.00</td><td>$509.00</td></tr></table><h3>6-Hour Cleaning</h3><table class=\\\"kb-table\\\"><tr><th>Frequency</th><th>Cost per Cleaning</th><th>w/ $59 MF</th><th>w/ $54 MF</th><th>w/ $49 MF</th></tr><tr><td>Once a month</td><td>$138.00</td><td>$197.00</td><td>$192.00</td><td>$187.00</td></tr><tr><td>Twice per month</td><td>$138.00</td><td>$335.00</td><td>$330.00</td><td>$325.00</td></tr><tr><td>3x per month</td><td>$138.00</td><td>$473.00</td><td>$468.00</td><td>$463.00</td></tr><tr><td>Weekly</td><td>$138.00</td><td>$611.00</td><td>$606.00</td><td>$601.00</td></tr></table><div class=\\\"callout gold\\\">Formula: Cost w/ MF = Membership Fee + (Cost per Cleaning × Frequency). Frequency counts: Once a month = 1, Twice per month = 2, 3x per month = 3, Weekly = 4.</div><h2>Trial &amp; One-Time Cleaning Pricing</h2><h3>Trial Cleaning: 20|20 Cohort (30 Days)</h3><table class=\\\"kb-table\\\"><tr><th>Duration</th><th>Trial Price</th><th>Regular Price</th></tr><tr><td>2 Hours</td><td>$105.00</td><td>$126.00</td></tr><tr><td>3 Hours</td><td>$157.50</td><td>$189.00</td></tr><tr><td>4 Hours</td><td>$210.00</td><td>$252.00</td></tr><tr><td>5 Hours</td><td>$262.50</td><td>$315.00</td></tr><tr><td>6 Hours</td><td>$315.00</td><td>$378.00</td></tr></table><h3>One-Time Cleaning: 30|30 Cohort (No Commitment)</h3><table class=\\\"kb-table\\\"><tr><th>Duration</th><th>Price</th></tr><tr><td>2 Hours</td><td>$126.00</td></tr><tr><td>3 Hours</td><td>$189.00</td></tr><tr><td>4 Hours</td><td>$252.00</td></tr><tr><td>5 Hours</td><td>$315.00</td></tr><tr><td>6 Hours</td><td>$378.00</td></tr></table><h3>One-Time Cleaning: 25|25 Cohort (No Commitment)</h3><table class=\\\"kb-table\\\"><tr><th>Duration</th><th>Price</th></tr><tr><td>2 Hours</td><td>-</td></tr><tr><td>3 Hours</td><td>$173.25</td></tr><tr><td>4 Hours</td><td>$231.00</td></tr><tr><td>5 Hours</td><td>$288.75</td></tr><tr><td>6 Hours</td><td>$346.50</td></tr></table><h2>Sales Tax</h2><p>Cleaning price, monthly membership fees, and ETF charges may be subject to sales tax depending on the customer's state. States currently collecting sales tax: <strong>AR, CT, DC, HI, KY, MN, NE, NJ, NM, NY, OH, PA, SD, TX, UT, WV</strong>. Always advise the customer of applicable sales tax when discussing membership terms and future cleaning costs.</p>\"}, {\"id\": \"training-roadmap\", \"section\": \"Training\", \"icon\": \"🗺️\", \"title\": \"Training Journey Roadmap\", \"desc\": \"From trainee to certified closer.\", \"tag\": \"training\", \"body\": \"<h2>1. Foundations Training</h2><p>Communication, customer needs, sales strategies, industry practices.</p> <h2>2. Product Training (Blended)</h2><p>Core skills: communication, service, sales techniques.</p> <h2>3. Product Knowledge Test</h2><p>15% of overall score.</p> <h2>4. Call Certification (Mock Call)</h2><p>Passing score: 100%. Failure may result in offboarding.</p> <h2>5. Nesting (Weeks 1 & 2)</h2><p>75% of overall score. Live sales tasks.</p> <div class=\\\"callout gold\\\">Failure to close 2+ sales/week may result in offboarding. 3 sales Week 1 = auto endorsed. 2 sales Weeks 1&2 = Nesting Extension.</div> <h2>6. Nesting Extension (Final Week)</h2><p>Minimum 3 sales to pass.</p>\"}, {\"id\": \"hubspot-tagging\", \"section\": \"Tools & Systems\", \"icon\": \"🏷️\", \"title\": \"HubSpot Tagging Guide\", \"desc\": \"Ticket status tags and how to use them.\", \"tag\": \"tools\", \"body\": \"<p>This is how ticket statuses look in HubSpot:</p>{{IMG:After_Sales_FCF_17}}<p>This is how ticket statuses look in HubSpot:</p>   <h2>Ticket Status Tags</h2> <table class=\\\"kb-table\\\"><tr><th>Tag</th><th>When to Use</th></tr> <tr><td><strong>New</strong></td><td>Unsorted leads</td></tr> <tr><td><strong>Assigned</strong></td><td>Team member responsible</td></tr> <tr><td><strong>Explicit 24hr Callback</strong></td><td>Follow-up within 24 hours</td></tr> <tr><td><strong>In Progress (1-5)</strong></td><td>Being handled. Number = contact attempts.</td></tr> <tr><td><strong>Closed as No Answer</strong></td><td>Attempts unsuccessful</td></tr> <tr><td><strong>Closed As Sale</strong></td><td>Successfully converted</td></tr> <tr><td><strong>Closed as DNC</strong></td><td>Customer requests no contact</td></tr> <tr><td><strong>Closed as Decline</strong></td><td>Customer declines</td></tr> <tr><td><strong>(Temp) Escalate</strong></td><td>Higher-level internal use</td></tr> <tr><td><strong>Closed (Do Not Use)</strong></td><td>Higher-level internal use</td></tr></table>  <h2>As-Is vs Actionable</h2> <h3>As-Is</h3><p>No further action needed: New, Assigned, In Progress, Explicit 24hr, (Temp) Escalate, Closed (Do Not Use).</p> <h3>Actionable</h3><ul><li><strong>No Answer:</strong> Unanswered/voicemail</li><li><strong>DNC:</strong> Cessation request or invalid number</li><li><strong>Decline:</strong> Cost, contracts, alternatives</li><li><strong>Sale:</strong> Job date + Django CID required</li></ul>\"}, {\"id\": \"ticket-dispositions\", \"section\": \"Tools & Systems\", \"icon\": \"📊\", \"title\": \"Ticket Dispositions\", \"desc\": \"Status movement rules and when to use each tag.\", \"tag\": \"tools\", \"body\": \"{{IMG:After_Sales_FCF_17}} <div class=\\\"callout\\\">What you log determines what leadership sees.</div>  <h2>Status Movement</h2>  <p>After first outreach (AM Touch), move to In Progress (2nd Attempt). No ticket stays New/Assigned after initial outreach.</p> <h3>Day 2</h3><p>After 3rd attempt, move to In Progress (3rd).</p> <h3>Day 3</h3><p>One outreach. After 4th, move to In Progress (4th/5th).</p>  <h2>Tag Usage</h2>  <h3>Closed as Declined</h3><p>After objection handling. Select decline reason.</p> <h3>No Answer</h3><p>After all attempts. Must complete all 3 required calls.</p> <h3>DNC</h3><p>Only when clearly requested. Sub-reasons: Existing, Disconnected, Language, Outside U.S., explicit DNC.</p> <h3>Sale</h3><p>Select type (DHJ/Trial/OTC), date, CID.</p> <div class=\\\"callout red\\\">If it's not updated correctly, it didn't happen.</div>\"}, {\"id\": \"lead-management\", \"section\": \"Tools & Systems\", \"icon\": \"📑\", \"title\": \"Ticket & Lead Management\", \"desc\": \"HubSpot views, filters, columns, and pipeline.\", \"tag\": \"tools\", \"body\": \"<h2>Saved View Tab</h2>  <p>Your personal working setup. Clone from All Tickets.</p> <div class=\\\"callout\\\">Lost in HubSpot? Go back to your Saved View.</div>  <h2>Table vs Board View</h2> <table class=\\\"kb-table\\\"><tr><th>Table View (Use This)</th><th>Board View (Avoid)</th></tr> <tr><td>Row-by-row, easy scan, faster</td><td>Card layout, more clicking, error risk</td></tr></table>  <h2>Recommended Columns</h2>  <p>Ticket Name, Note, Phone, Contacts, Email, State, Owner Assigned Date, Status, Time Since Last Call, Timezone, Last Activity, First Outbound Call, 2nd Outbound Status.</p>  <div class=\\\"callout red\\\">Before any call: confirm Pipeline correct + Ticket Owner = Me.</div>  <h2>Common Filters</h2> <ul><li>Assigned + 2nd Week: AM/PM touches</li><li>In Progress (3rd Attempt)</li><li>Inbound SMS/Call Required</li></ul>\"}, {\"id\": \"aircall-dispositions\", \"section\": \"Tools & Systems\", \"icon\": \"📞\", \"title\": \"Aircall Dispositions\", \"desc\": \"How to tag calls in Aircall.\", \"tag\": \"tools\", \"body\": \"<p>After every call in Aircall, tag it with the correct disposition:</p>{{IMG:Tools_19}}<h2>Which Tag to Use</h2>  <table class=\\\"kb-table\\\"><tr><th>Aircall Tag</th><th>When to Use</th></tr> <tr><td><strong>Growth | Call Did Not Connect</strong></td><td>Auto drop, Voicemail, No answer, Incorrect number, Call failed</td></tr> <tr><td><strong>Growth | Explicit DNC</strong></td><td>\\\"Stop calling me\\\" / \\\"Remove me from your list\\\"</td></tr> <tr><td><strong>Growth | Not a Sales Lead</strong></td><td>Wrong number, Cleaner applicant, Vendor inquiry, Unrelated inquiry</td></tr> <tr><td><strong>Growth | Already an Existing Customer</strong></td><td>Customer already has an existing account</td></tr> <tr><td><strong>Growth | Callback Request</strong></td><td>\\\"Call me back later\\\" / \\\"Can you call tomorrow?\\\"</td></tr> <tr><td><strong>Growth | Did Not Buy</strong></td><td>Customer had objections but did not request a callback / Customer declined</td></tr> <tr><td><strong>Growth | SALES</strong></td><td>You closed the sale!</td></tr></table><h2>DNC Trigger Phrases</h2>{{IMG:Tools_15}}\"}, {\"id\": \"dnc-handling\", \"section\": \"Tools & Systems\", \"icon\": \"🚫\", \"title\": \"DNC Handling\", \"desc\": \"Step-by-step when a customer says Do Not Call.\", \"tag\": \"tools\", \"body\": \"<p>Complete ALL four steps:</p> <h2>Step 1 — Aircall</h2><p>Tag <code>Growth | Explicit DNC Request</code></p> <h2>Step 2 — HubSpot</h2><p>Tag: <strong>Closed as Do Not Call</strong></p> <h2>Step 3 — Django</h2><p>Lead profile → <strong>Do > Deactivate > Unsubscribe</strong></p> <h2>Step 4 — DNC Tracker Sheet</h2><p>Log with details and reason.</p> <div class=\\\"callout red\\\">Missing any step = ZTP Level 5 (terminable on first offense).</div> {{IMG:After_Sales_ONE_TIME_9}}\"}, {\"id\": \"voicelab\", \"section\": \"Tools & Systems\", \"icon\": \"🎙️\", \"title\": \"VoiceLab\", \"desc\": \"AI voice sales call simulator.\", \"tag\": \"tools\", \"body\": \"<p>Practice live FCF sales calls against an AI voice simulator.</p> <table class=\\\"kb-table\\\"><tr><th>Component</th><th>Link</th></tr> <tr><td>Voice Simulator</td><td><a href=\\\"https://voice-lab-rose.vercel.app\\\" target=\\\"_blank\\\">voice-lab-rose.vercel.app</a></td></tr> <tr><td>Performance Dashboard</td><td><a href=\\\"https://voicelab-v1-0.vercel.app\\\" target=\\\"_blank\\\">voicelab-v1-0.vercel.app</a></td></tr> </table> <div style=\\\"margin:20px 0;text-align:center;\\\"> <a href=\\\"https://chatgpt.com/g/g-6a34157c4b908191953173a1e24dc881-voicelab-ai-call-simulator-for-trainees\\\" target=\\\"_blank\\\" style=\\\"display:inline-block;background:#1E3A5F;color:#fff;padding:14px 28px;border-radius:10px;font-size:15px;font-weight:700;text-decoration:none;box-shadow:0 4px 12px rgba(30,58,95,0.2);transition:all 0.15s;\\\">Start AI Call Simulator (ChatGPT)</a> </div> <div class=\\\"callout\\\">Use the Voice Simulator for real-time voice practice. Use the ChatGPT AI Call Simulator for text-based call simulation and self-study.</div>\"}, {\"id\": \"booking-websites\", \"section\": \"Booking Website\", \"icon\": \"🔗\", \"title\": \"Booking Websites\", \"desc\": \"Direct links to the FCF and Trial/One-Time booking flows.\", \"tag\": \"booking\", \"body\": \"<div class=\\\"callout red\\\" style=\\\"font-size:16px;\\\">🥸 <strong>ALWAYS open these links in an Incognito / Private window.</strong> Never book a customer using your regular browser window.</div><h2>FCF Booking Website</h2><p>Use this link for ForeverClean (FCF) membership sales.</p><a href=\\\"https://try.homeaglow.com/agent?utm_content=fcf_latest_variant\\\" target=\\\"_blank\\\" style=\\\"display:inline-block;width:100%;box-sizing:border-box;text-align:center;background:#1E3A5F;color:#fff;padding:16px 24px;border-radius:10px;font-size:16px;font-weight:700;text-decoration:none;margin-bottom:14px;box-shadow:0 4px 12px rgba(30,58,95,0.2);\\\">🧹 Open FCF Booking Website</a><div class=\\\"copy-block copy-block-small\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>https://try.homeaglow.com/agent?utm_content=fcf_latest_variant</div><h2>Trial / One-Time Cleaning Booking Website</h2><p>Use this link for Trial Cleaning and One-Time Cleaning sales.</p><a href=\\\"https://www.homeaglow.com/customer/choosedate\\\" target=\\\"_blank\\\" style=\\\"display:inline-block;width:100%;box-sizing:border-box;text-align:center;background:#1E3A5F;color:#fff;padding:16px 24px;border-radius:10px;font-size:16px;font-weight:700;text-decoration:none;margin-bottom:14px;box-shadow:0 4px 12px rgba(30,58,95,0.2);\\\">🧽 Open Trial / One-Time Booking Website</a><div class=\\\"copy-block copy-block-small\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>https://www.homeaglow.com/customer/choosedate</div><div class=\\\"callout gold\\\">🥸 Reminder: Incognito Mode prevents autofill, saved sessions, and browser history from mixing customer acco mary:<br>- Unlimited cleanings starting at just $40.00 for 2 hrs (a $60.00 savings)(monthly, weekly, or yes even daily!)<br>- Unlimited access to Homeaglow background-checked cleaners<br>- 365 day a year availability<br>- Free cancellations &amp; reschedules up to 24 hours before appointments<br><br>You can manage your appointments and your membership through this link: <span class=\\\"hl\\\">&lt;C Do -&gt; Auto Login -&gt; Dashboard&gt;</span><br><br>Thank you,<br>Homeaglow Team</div><div class=\\\"callout gold\\\">All <span class=\\\"hl\\\">highlighted fields</span> must be edited with complete and accurate information before sending.</div>\"}, {\"id\": \"email-otc\", \"section\": \"Templates\", \"icon\": \"📧\", \"title\": \"Post-Sale Email: One-Time Cleaning\", \"desc\": \"Email template for One-Time Cleaning sale.\", \"tag\": \"templates\", \"body\": \"<h2>Subject Line</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Your Homeaglow Appointment</div><h2>One-Time Cleaning Sale</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi <span class=\\\"hl\\\">&lt;Customer&gt;</span>,<br><br>Thank you for taking the call.<br><br>As discussed, your <span class=\\\"hl\\\">&lt;Date&gt;</span> <span class=\\\"hl\\\">&lt;x-hr&gt;</span> cleaning request has been submitted to the Top cleaners in your area.<br><br>Your first cleaning will entail being charged upfront with a total amount of <span class=\\\"hl\\\">&lt;$XX.XX&gt;</span>. This amount should cover a total of <span class=\\\"hl\\\">&lt;# of hours&gt;</span> hours of standard cleaning.<br><br>Please note that any premium tasks like laundry, cleaning of interior windows, inside of fridge, oven, cabinets, etc., will cost an extra hour for each service and are priced at your cleaner's hourly rate. For seamless scheduling of subsequent appointments, please remember to update your address after the first appointment is completed. You may update it online here: <span class=\\\"hl\\\">&lt;C Do -&gt; Auto Login -&gt; Location&gt;</span>.<br><br>Best Regards,<br>Homeaglow Team</div><div class=\\\"callout gold\\\">All <span class=\\\"hl\\\">highlighted fields</span> must be edited with complete and accurate information before sending.</div>\"}, {\"id\": \"email-think-about-it\", \"section\": \"Templates\", \"icon\": \"📧\", \"title\": \"Follow-Up Email: Think About It\", \"desc\": \"Email to send after a call where the customer wants to think it over.\", \"tag\": \"templates\", \"body\": \"<h2>Subject Line</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Your Homeaglow Quote</div><h2>Think About It: Follow-Up Email</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi <span class=\\\"hl\\\">(Customer name)</span>,<br><br>I hope this message finds you well!<br><br>Here’s a summary of what we discussed: for a space of that size, I would recommend an initial cleaning of <span class=\\\"hl\\\">## hours</span>. The market rate for 6 hours of cleaning is currently at around <span class=\\\"hl\\\">(National average cost)</span>.<br><br>However, with Homeaglow, we offer HUGE savings! The voucher cost of <span class=\\\"hl\\\">(Voucher cost)</span> provides you with <span class=\\\"hl\\\">## hours</span> of cleaning and enrolls you in our membership program called ForeverClean for <span class=\\\"hl\\\">(MF)</span> per month. This membership allows you to book unlimited cleaning at roughly $23/hour. For example, your next appointment for <span class=\\\"hl\\\">## hours</span> of cleaning will be around <span class=\\\"hl\\\">(rough estimate)</span> per appointment. Our appointments are flexible based on your cleaning needs.<br><br>The ForeverClean membership can be canceled at any time, making this promotion a no-brainer. Just a heads up: if you cancel before <span class=\\\"hl\\\">## paid months</span>, we ask that you pay an early cancellation fee of <span class=\\\"hl\\\">$XXX</span> - that is $35 multiplied by the total number of hours of your initial cleaning.<br><br><em>(Optional Section:)</em><br><br>As we love to provide discounted rates for our customers, we also offer a trial cleaning. Instead of the original amount of <span class=\\\"hl\\\">$##</span>, you can have it for <span class=\\\"hl\\\">$##</span>. This option allows you to transition to a membership after 30 days, or you can let us know if you’d prefer to cancel it with zero obligations.<br><br>Let me know your thoughts, I am here to help you!<br><br>Best regards,<br><span class=\\\"hl\\\">(Your name)</span> from Homeaglow</div><div class=\\\"callout\\\">Send this after a call ends without a close, when the customer says they want to think it over.</div>\"}, {\"id\": \"vm-sms-scripts\", \"section\": \"Templates\", \"icon\": \"💬\", \"title\": \"VM & SMS Scripts\", \"desc\": \"Voicemail messages and SMS outreach scripts by day.\", \"tag\": \"templates\", \"body\": \"<h2>Day 1 — AM Touch (Voicemail)</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], this is [Your Name] from Homeaglow! I noticed you visited our website or may have come across our $19 cleaning ad on social media. I'd love to help you take advantage of that and get your first cleaning scheduled. You can reach me at [Callback Number]. I'll also try again later today in case this isn't the best time. Talk soon!</div> <h2>Day 1 — PM Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], it's [Your Name] again from Homeaglow. Just following up because I noticed you checked us out online or maybe saw our $19 cleaning offer on social media. It's a great way to get started, and I'd be happy to walk you through how it works. Call or text me back at [Callback Number] when you can!</div> <h2>Day 2 — AM Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Good morning [Name], this is [Your Name] with Homeaglow. I wanted to follow up since you recently visited our website or might have seen our $19 cleaning ad. Many customers like to use that offer to try us out. Call me at [Callback Number], and I can help you set that up quickly.</div> <h2>Day 2 — PM Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], it's [Your Name] again with Homeaglow. Just circling back—you may have seen our $19 cleaning ad on social media or checked us out online. It's a limited-time offer, and I'd love for you to take advantage of it. Give me a quick call at [Callback Number] when you're ready.</div> <h2>Day 3 — One Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hello [Name], this is [Your Name] from Homeaglow. I've tried reaching you a few times because I noticed your interest in our $19 cleaning ad or website offer. It's an easy way to get started with a trusted cleaner in your area. Please return my call at [Callback Number], and I'll help get you set up.</div> <h2>Day 4 — One Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], this is [Your Name] with Homeaglow. I just wanted to make one more attempt to connect. You may have visited our website or noticed our $19 cleaning ad, and I'd be happy to help you lock in that offer. If you're interested, call me back at [Callback Number].</div> <h2>Day 5 — One Touch</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi [Name], this is [Your Name] with Homeaglow. I just wanted to check in one more time before the weekend ends. If you saw our $19 cleaning ad or visited our site, now's a great chance to grab that offer. Call me back at [Callback Number] if you'd like me to help set it up.</div> <h2>SMS — First Outreach</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer Name)! This is [Agent Name] from Homeaglow. We got your inquiry at Homeaglow.com/deals and saw you're interested in cleaning. We offer member vouchers: $9 for 2 hrs, $19 for 3 hrs, $39 for 4 hrs, $79 for 6 hrs. This covers your first cleaning! Let me know what works best!</div> <h2>SMS — Second Outreach</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer Name), it's [Agent Name] again from Homeaglow. We've got your inquiry via homeaglow.com/deals and have great deals to help you keep your home sparkling! For $9, you get 2 hours of cleaning, or check out other options starting at $19 for 3 hours. Reply with GETCLEAN and I'd be happy to set up your first cleaning!</div> <h2>SMS — Third Outreach (Urgency)</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer Name), just wanted to remind you about our special deals on cleaning services! Our schedule is filling up fast, and I'd love to get you booked for a cleaning that fits your needs. Reply with GETCLEAN now and I'd be happy to give you a call to secure your spot!</div> <h2>SMS — Final Push</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer Name), this is your last chance to grab our exclusive cleaning deals before they're gone! Our schedule is almost full, and I'd hate for you to miss out. Reply with GETCLEAN now and I'll call you right away to lock in your spot.</div>\"}, {\"id\": \"ztp\", \"section\": \"Compliance\", \"icon\": \"⛔\", \"title\": \"ZTP Violations (Level 5)\", \"desc\": \"Zero-tolerance — terminable on first offense.\", \"tag\": \"compliance\", \"body\": \"<p>Level 5 offenses carry immediate consequences including possible termination on first instance.</p> <h2>1. Fraudulent Activities / Gross Negligence</h2><p>Mishandling credit card info: using one customer's card for another, storing details on notepads/screenshots/apps.</p> <h2>2. Security Violations</h2><p>Sending auto-login links to wrong users, compromising shared credentials.</p> <h2>3. Misrepresentation of Service</h2><p>Failing to disclose ForeverClean is a cleaning membership.</p> <h2>4. DNC Tagging</h2><p>Must immediately honor and tag DNC requests. Violations: contacting after DNC, failing to tag, continuing outreach, bypassing DNC.</p> <h2>5. Requesting Sensitive Info via Email/SMS</h2><p>NEVER request: card numbers, bank info, government IDs, financial credentials.</p> <div class=\\\"callout\\\">If a customer voluntarily sends sensitive info without being asked, the agent will NOT be penalized.</div>\"}, {\"id\": \"pv-level4\", \"section\": \"Compliance\", \"icon\": \"🔴\", \"title\": \"Protocol Violations — Level 4\", \"desc\": \"High impact. Compliance and customer trust.\", \"tag\": \"compliance\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Violation</th><th>Penalty</th></tr><tr><td><strong>Idle Time</strong> — No activity 4+ min while logged in</td><td rowspan=\\\"4\\\">1st: NTE · 2nd: Final Warning · 3rd: 5-Day Suspension · 4th: Termination</td></tr><tr><td><strong>Improper Happiness Guarantee Use</strong></td></tr><tr><td><strong>Tagging Existing Lead as Sale</strong></td></tr><tr><td><strong>Incorrect Membership Positioning</strong></td></tr></table> <div class=\\\"callout red\\\">Level 4: NO clearing period. All offenses remain on record.</div>\"}, {\"id\": \"pv-level3\", \"section\": \"Compliance\", \"icon\": \"🟡\", \"title\": \"Protocol Violations — Level 3\", \"desc\": \"Moderate impact. Service quality and legal exposure.\", \"tag\": \"compliance\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Violation</th><th>Penalty</th></tr><tr><td><strong>Contacting Outside Business Hours</strong></td><td rowspan=\\\"6\\\">1st: Coaching · 2nd: NTE · 3rd: Final Warning · 4th: 5-Day Suspension · 5th: Termination</td></tr><tr><td><strong>No effort to overcome objections</strong></td></tr><tr><td><strong>Tone Violation</strong></td></tr><tr><td><strong>Failure to Pause/Resume Recording</strong></td></tr><tr><td><strong>Failure to mention MF/MCT</strong></td></tr><tr><td><strong>Ticket Improperly Marked as Sale</strong></td></tr></table> <div class=\\\"callout\\\">Levels 1-3: 1-month clearing period.</div>\"}, {\"id\": \"pv-level2\", \"section\": \"Compliance\", \"icon\": \"🟠\", \"title\": \"Protocol Violations — Level 2\", \"desc\": \"Low-moderate. Misinformation or inconsistent comms.\", \"tag\": \"compliance\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Violation</th><th>Penalty</th></tr><tr><td><strong>Incorrect Cohort Offer/Link</strong></td><td rowspan=\\\"6\\\">1st-2nd: Coaching · 3rd: NTE · 4th: Final Warning · 5th: 3-Day Suspension · 6th: Termination</td></tr><tr><td><strong>After-Sales/Compliance Gaps</strong></td></tr><tr><td><strong>Legal Wording Non-Compliance</strong></td></tr><tr><td><strong>Contact Attempts Non-Compliance</strong></td></tr><tr><td><strong>Incorrect HubSpot Tagging</strong></td></tr><tr><td><strong>HDYHAU Non-Compliance</strong></td></tr></table>\"}, {\"id\": \"pv-level1\", \"section\": \"Compliance\", \"icon\": \"🔵\", \"title\": \"Protocol Violations — Level 1\", \"desc\": \"Low impact. Process corrections.\", \"tag\": \"compliance\", \"body\": \"<table class=\\\"kb-table\\\"><tr><th>Violation</th><th>Penalty</th></tr><tr><td><strong>Failure to ask discovery questions</strong></td><td rowspan=\\\"4\\\">1st-3rd: Coaching · 4th: NTE · 5th: Final Warning · 6th: 2-Day Suspension · 7th: Termination</td></tr><tr><td><strong>HubSpot Availability Non-Compliance</strong></td></tr><tr><td><strong>Failure to tick SMS notification</strong></td></tr><tr><td><strong>Sending Internal Notes as SMS/Email</strong></td></tr></table>\"}, {\"id\": \"qa-guidelines\", \"section\": \"Compliance\", \"icon\": \"✅\", \"title\": \"QA Guidelines\", \"desc\": \"Opening spiel, recap, validation ratings.\", \"tag\": \"compliance\", \"body\": \"<h2>Opening Spiel</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Customer), this is (Your Name) from Homeaglow calling on a recorded line. I noticed you visited one of our websites or have seen one of our ads. I wanted to call to see how we can help schedule a cleaning for you.</div> <h2>Things to Remember</h2> <ul><li><strong>Membership Fee:</strong> Did agent inform? Did customer understand $59/month ($54/$49)?</li><li><strong>MCT:</strong> Did customer understand 6/5/4 months?</li><li><strong>Schedule of Charges:</strong> First MF charges after initial appointment?</li><li><strong>Cancellation Policy / ETF:</strong> Clear expectations?</li><li><strong>Upcoming Charges:</strong> Pricing, type, date, extra hours?</li><li><strong>Cleaner Rates:</strong> Always use \\\"roughly\\\" or \\\"approximately\\\"</li></ul> <h2>The Recap</h2> <ul><li>All info accurate?</li><li>Terms verbally agreed? (\\\"Is that a clear YES?\\\")</li><li>Terms understood?</li><li>Changes noted in account?</li></ul> <h2>CRM Action</h2><p>Add <code>fcsales_lead</code> to notes. Add <code>do_not_auto_add_alt_start_times</code> if no alternate dates.</p> <div class=\\\"callout red\\\">Incorrect post emails = markdowns and resubmissions with half points.</div> <h2>Validation Ratings</h2> <table class=\\\"kb-table\\\"><tr><th>Rating</th><th>Points</th></tr><tr><td>Valid</td><td>1.1 / 0.8</td></tr><tr><td>Invalid</td><td>0</td></tr><tr><td>Resubmission</td><td>0.55/0.25 and 0.4</td></tr></table>\"}, {\"id\": \"faqs\", \"section\": \"Customer Support\", \"icon\": \"💬\", \"title\": \"FAQs & Objection Handling\", \"desc\": \"Common customer questions with suggested responses.\", \"tag\": \"support\", \"body\": \"<p>Adjust tone to fit conversation. Starting points, not verbatim scripts.</p> <h3>Bank flagged as scam</h3><p>Ask for another card. If none: stay on line while they call bank.</p> <h3>Book for tomorrow?</h3><p>Recommend 2-day window. Slack: cpcalldown_24hoursfromstarttime_jobs.</p> <h3>Cleaners bonded/insured?</h3><p>Independent contractors with certification and background checks.</p> <h3>$23/hr for all future?</h3><p>As low as $23/hr, up to 50% less than local average.</p> <h3>What's included?</h3><p>Surfaces, vacuuming, mopping, sinks/showers/tubs, tidying, garbage.</p> <h3>Cleaner supplies?</h3><p>Bring their own. Customer can request their products.</p> <h3>Late or no-show?</h3><p>24/7 Support. Direct CP contact once claimed.</p> <h3>Same cleaner?</h3><p>Book from dashboard, subject to availability.</p> <h3>Not happy?</h3><p>Team has processes to make it right.</p> <h3>15% transaction fee?</h3><p>Platform upkeep: dashboard, booking, support.</p> <h3>Stuck with contract?</h3><p>Will find a better-fit cleaner.</p> <h3>Choose gender?</h3><p>Can't filter up front. \\\"Report an issue\\\" > \\\"Different cleaner\\\" up to 24hrs before.</p> <h3>Theft?</h3><p>Contact cleaner first. Homeaglow mediates within 30 days.</p> <h3>Referral?</h3><p>Up to $10 after friend's first cleaning. Credit only.</p> <h3>Where located?</h3><p>HQ: Austin TX. Agent: offshore team, pivot to ZIP.</p> <h3>English-speaking?</h3><p>Top-rated local. Future: choose via dashboard.</p> <h3>Pricing?</h3><p>FC: ~$23/hr. Non-member: hourly, 2hr min + 5% fee.</p> <h3>Pay cash?</h3><p>No. Upfront payment required.</p> <h3>NOT included?</h3><p>Exterior windows, deep stains, mold, infestations.</p>\"}, {\"id\": \"csr-inbound\", \"section\": \"Customer Support\", \"icon\": \"📲\", \"title\": \"Inbound CSR Calls\", \"desc\": \"When a customer service call reaches sales.\", \"tag\": \"support\", \"body\": \"<div class=\\\"callout red\\\">We do NOT handle disputes, refunds, cancellations, or any after-sale related concerns. We cannot transfer calls to another department. Direct customers to self-service support.</div>  <h2>What to Say</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi Mr./Ms. <span class=\\\"hl\\\">Customer</span>, you've reached the sales department. Unfortunately, we don't have access to customer accounts, so I'm unable to assist with your concern. The fastest way to get help is through the Homeaglow Help Center or by emailing support. A representative will get back to you within 24 hours.</div>  <h2>Direct the Customer Here</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Help Center: https://www.homeaglow.com/help/184 Email: support@homeaglow.com</div> <p>Let them know they can also use the \\\"Contact Support\\\" button at the bottom of the Help Center page to send a message to Homeaglow Support. Inquiries may take up to 24 hours for a response.</p>  <div class=\\\"callout gold\\\">DO NOT make any promises regarding refunds, cancellations, or account changes. DO NOT attempt to look up or modify customer accounts. Simply direct them to the Help Center or support email and set the expectation of a 24-hour response time.</div>  <h3>Ticket Disposition</h3> <table class=\\\"kb-table\\\"> <tr><th>Field</th><th>Value</th></tr> <tr><td>Status</td><td><code>Closed as Do not call again</code></td></tr> <tr><td>Sub-status</td><td><code>Do not call again because - This is already an existing customer</code></td></tr> </table>\"}, {\"id\": \"sms-guide\", \"section\": \"Customer Support\", \"icon\": \"✉️\", \"title\": \"SMS Guide\", \"desc\": \"Moving a sale forward over text.\", \"tag\": \"support\", \"body\": \"<h2>When customer can't talk</h2><p>Don't proactively offer to close over SMS (risks markdown). Ask for callback time first.</p> <h2>Step 1 — Send SMS</h2> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>Hi (Name), I understand that you're not available to talk over the phone at the moment. I don't want you to miss our limited offer, and I'd like to help you book your cleaning appointment the soonest time. If this is more convenient for you, is it okay if we continue this conversation over text?</div> <p>Yes → Step 2. No → \\\"When can I call you back?\\\"</p> <h2>Step 2 — Call flow over text</h2><ul><li>Phase 2: Appointment info, quotes, MF/MCT</li><li>Phase 3: Closing</li><li>Phase 4: Expectations</li><li>Phase 5: Contact info</li></ul> <h2>Step 3 — After-sales verbatim</h2><p>Send full script by text. Ask: \\\"Do you understand and agree?\\\" Yes → submit.</p> <div class=\\\"callout\\\">If nothing skipped during SMS, no need to call again. Markdown applies if no clear \\\"yes\\\" collected.</div>\"}, {\"id\": \"aftersales-fcf\", \"section\": \"After-Sales\", \"icon\": \"✅\", \"title\": \"After-Sales: FCF (Detailed)\", \"desc\": \"Complete step-by-step after-sales process for FCF/DHJ sales.\", \"tag\": \"aftersales\", \"body\": \"<div class=\\\"callout\\\">Complete this checklist after every FCF or DHJ sale. Do not skip any step.</div>  <h2>Step 1: Update HubSpot Ticket Status</h2> <p>Open the ticket. Click <strong>Ticket Status</strong> dropdown, select <strong>Closed as a Sale</strong>.{{IMG:After_Sales_FCF_17}}</p>  <p>Fill in the <strong>Dependent Properties</strong>:</p> <table class=\\\"kb-table\\\"> <tr><th>Field</th><th>What to Enter</th></tr> <tr><td>I made a sale and it's a...</td><td><code>first_cleaning_free</code> (FCF) or <code>DHJ voucher</code></td></tr> <tr><td>First Job Date</td><td>Customer's appointment date (MM/DD/YYYY)</td></tr> <tr><td>Django C ID</td><td>Customer's Django ID number</td></tr> <tr><td>Is this a Gift Card?</td><td>Select appropriate option</td></tr> </table>  <h2>Step 2: Send Email to Customer on Django</h2> <p>Go to the customer profile in Django. Click the <strong>Post-Book</strong> tab{{IMG:After_Sales_FCF_11}}.</p>  <div class=\\\"step-box\\\"> <ol> <li>Select From: <strong>Emma Evans emma@homeaglow.com (833) 265-5215</strong></li> <li>Select the customer's email address (radio button)</li> <li>Check <strong>\\\"Notify user via SMS that we responded via email\\\"</strong></li> <li>Subject: <strong>\\\"Your Homeaglow Appointment\\\"</strong></li> <li>Paste the correct email template (see Templates section)</li> <li>Replace all <span class=\\\"hl\\\">highlighted fields</span> with accurate customer info</li> <li>Insert dashboard link: <strong>C Do > Auto Login > Dashboard</strong></li> <li>Click <strong>Send</strong></li> </ol> </div>  <div class=\\\"callout red\\\">Double-check every <span class=\\\"hl\\\">highlighted field</span> before sending. Incorrect post-emails result in markdowns and resubmissions at half points.</div>  <h2>Step 3: Leave Internal Note on Django</h2>  <div class=\\\"step-box\\\"> <ol> <li>Select the <strong>{{IMG:After_Sales_FCF_15}}internal_note</strong> radio button</li> <li>Paste the internal note template</li> <li>Fill in all fields accurately</li> <li>Click <strong>Send</strong></li> </ol> </div>  <h3>Internal Note (FCF)</h3> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>fcsales_lead Quoted Price Range : $19 - Xhrs FCF Commitment Term: 6 mos. Membership fee amount: $59 1st Appt pricing cohort : (0|0)</div>  <h3>Internal Note (DHJ Voucher)</h3> <div class=\\\"copy-block\\\" onclick=\\\"copyBlock(this)\\\"><button class=\\\"copy-btn\\\">Copy</button>fcsales_lead Quoted Price Range : x hr - DHJ Voucher Commitment term : 6 Mos Membership fee amount: $59 1st Appt pricing cohort : (0|0)</div>\"}, {\"id\": \"aftersales-trial\", \"section\": \"After-Sales\", \"icon\": \"🧪\", \"title\": \"After-Sales: Trial (Detailed)\", \"desc\": \"Complete 13-step after-sales walkthrough for Trial Cleaning sales.\", \"tag\": \"aftersales\", \"body\": \"<div class=\\\"callout red\\\">Trial sales require 13 steps. Do them in order. Do not skip any step.</div>  <h2>Step 1: Update HubSpot Ticket</h2> <p>Ticket Status > <strong>Closed as a Sale</strong>. In Dependent Properties:{{IMG:After_Sales_FCF_17}}</p>  <table class=\\\"kb-table\\\"> <tr><th>Field</th><th>Value</th></tr> <tr><td>I made a sale and it's a...</td><td><code>trial_cleaning</code></td></tr> <tr><td>First Job Date</td><td>Customer's appointment date</td></tr> <tr><td>Django C ID</td><td>Customer's Django ID</td></tr> </table>  <h2>Step 2: Update Contact Details in HubSpot</h2> <table class=\\\"kb-table\\\"> <tr><th>Field</th><th>Value</th></tr> <tr><td>Did we make a sale</td><td>Yes</td></tr> <tr><td>Sale Type</td><td>Trial</td></tr> <tr><td>Lifecycle Stage</td><td>Customer</td></tr> <tr><td>Contact Owner</td><td>Your name</td></tr> <tr><td>HAG First Job Date</td><td>Appointment date</td></tr> <tr><td>HAG Customer ID</td><td>Django CID</td></tr> <tr><td>Date of Sale</td><td>Today's date (CST timezone)</td></tr> </table>  <h2>Step 3: Manual Charge on Django</h2> <p>Go to <strong>DO > Charge > Create</strong>{{IMG:After_Sales_ONE_TIME_16}}</p>  <div class=\\\"step-box\\\"> <ol> <li><strong>Amount:</strong> Enter the total charge amount</li> <li><strong>Customer Facing Descriptor:</strong> Must start with HOMEAGLOW. Max 22 characters. Format: <code>HOMEAGLOW MM/DD Xhrs</code></li> <li><strong>CRM Descriptor:</strong> <code>Trial_cleaning</code></li> <li>Check <strong>\\\"Auto-Email Customer\\\"</strong></li> <li>Click <strong>Charge Customer</strong></li> </ol> </div>  <h2>Step 4: Invalidate the 0.5hr Voucher</h2> <p>Go to <strong>DO > Invalidate</strong>{{IMG:After_Sales_ONE_TIME_21}}</p>  <div class=\\\"step-box\\\"> <ol> <li><strong>Voucher Code:</strong> Paste the 0.5-hour voucher code</li> <li><strong>\\\"Should we get paid?\\\"</strong> > Select <strong>No</strong></li> <li><strong>Top Up Credits:</strong> <code>$0.00</cod var CONTENT_VERSION="2026-07-14-3";
function loadPages(){
  try{
    var storedVersion=localStorage.getItem("kb_version");
    if(storedVersion!==CONTENT_VERSION){
      localStorage.removeItem("kb_pages");
      localStorage.setItem("kb_version",CONTENT_VERSION);
      return null;
    }
    var s=localStorage.getItem("kb_pages");
    if(s)return JSON.parse(s);
  }catch(e){}
  return null;
}
function savePages(p){localStorage.setItem("kb_pages",JSON.stringify(p));localStorage.setItem("kb_version",CONTENT_VERSION);}
function getPages(){return loadPages()||DEFAULT_PAGES.slice();}

var adminMode=false,activeCat="all";
var homeGrid,pageView,searchInput,catTabs,editOverlay,editModal;

var DEFAULT_SECTION_ORDER=["Training","Tools & Systems","Booking Website","After-Sales","Compliance","Templates","Customer Support"];
var DEFAULT_TAG_MAP={"Training":"training","Tools & Systems":"tools","Booking Website":"booking","After-Sales":"aftersales","Compliance":"compliance","Templates":"templates","Customer Support":"support"};
var DEFAULT_TAG_CLASS={"training":"tag-training","tools":"tag-tools","aftersales":"tag-aftersales","compliance":"tag-compliance","templates":"tag-templates","support":"tag-support","booking":"tag-booking"};
var DEFAULT_SECTION_COLORS={"Training":"#16A34A","Tools & Systems":"#2563EB","After-Sales":"#EA580C","Compliance":"#DC2626","Templates":"#D97706","Customer Support":"#7C3AED","Booking Website":"#0D9488"};
var TAB_LABELS={"Training":"Training","Tools & Systems":"Tools","Booking Website":"Booking","After-Sales":"After-Sales","Compliance":"Compliance","Templates":"Templates","Customer Support":"Support"};
var EXTRA_TAG_COLORS=["#0891B2","#DB2777","#65A30D","#9333EA","#F59E0B","#0F766E","#BE185D","#4F46E5"];

function loadCustomSections(){try{var s=localStorage.getItem("kb_custom_sections");if(s)return JSON.parse(s);}catch(e){}return [];}
function saveCustomSections(list){localStorage.setItem("kb_custom_sections",JSON.stringify(list));}

function getSectionOrder(){var cs=loadCustomSections();return DEFAULT_SECTION_ORDER.concat(cs.map(function(c){return c.section;}));}
function getTagMap(){var m=Object.assign({},DEFAULT_TAG_MAP);loadCustomSections().forEach(function(c){m[c.section]=c.tag;});return m;}
function getTagClass(){var m=Object.assign({},DEFAULT_TAG_CLASS);loadCustomSections().forEach(function(c){m[c.tag]="tag-"+c.tag;});return m;}
function getSectionColors(){var m=Object.assign({},DEFAULT_SECTION_COLORS);loadCustomSections().forEach(function(c){m[c.section]=c.color;});return m;}
function getTabLabels(){var m=Object.assign({},TAB_LABELS);loadCustomSections().forEach(function(c){m[c.section]=c.label;});return m;}

var sectionOrder,tagMap,tagClass,sectionColors,tabLabels;
function refreshCategoryConfig(){
  sectionOrder=getSectionOrder();
  tagMap=getTagMap();
  tagClass=getTagClass();
  sectionColors=getSectionColors();
  tabLabels=getTabLabels();
  injectCustomTagStyles();
}

function injectCustomTagStyles(){
  var style=document.getElementById("custom-tag-styles");
  if(!style){style=document.createElement("style");style.id="custom-tag-styles";document.head.appendChild(style);}
  var css="";
  loadCustomSections().forEach(function(c){
    var soft=c.color+"22";
    css+=".tag-"+c.tag+"{background:"+soft+";color:"+c.color+";}";
  });
  style.textContent=css;
}

function renderCatTabs(){
  var labels=tabLabels;
  var h="<div class='cat-tab "+(activeCat==="all"?"active":"")+"' data-filter='all'>All</div>";
  sectionOrder.forEach(function(sec){
    var tag=tagMap[sec];if(!tag)return;
    var label=labels[sec]||sec;
    var extra="";
    var isCustom=loadCustomSections().some(function(c){return c.section===sec;});
    if(isCustom){extra="<button class='cat-tab-del' onclick=\"event.stopPropagation();deleteCategory('"+sec.replace(/'/g,"\\'")+"')\">&#215;</button>";}
    h+="<div class='cat-tab "+(activeCat===tag?"active":"")+"' data-filter='"+tag+"'>"+label+extra+"</div>";
  });
  h+="<div class='cat-tab cat-tab-add' onclick='addNewCategory()'>+ New Tab</div>";
  catTabs.innerHTML=h;
}

function addNewCategory(){
  var section=prompt("New category name (e.g. 'Things You Should Know'):");
  if(!section)return;
  section=section.trim();if(!section)return;
  var existing=getSectionOrder();
  if(existing.indexOf(section)>=0){alert("A category with that name already exists.");return;}
  var label=prompt("Short label to show on the tab (e.g. 'Good to Know'):",section);
  if(label===null)return;
  label=(label||section).trim();
  var tag=section.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"").slice(0,24);
  if(!tag)tag="cat"+Date.now();
  var allTags=Object.values(getTagMap());
  var base=tag,n=2;while(allTags.indexOf(tag)>=0){tag=base+"-"+n;n++;}
  var custom=loadCustomSections();
  var color=EXTRA_TAG_COLORS[custom.length%EXTRA_TAG_COLORS.length];
  custom.push({section:section,label:label,tag:tag,color:color});
  saveCustomSections(custom);
  refreshCategoryConfig();
  renderCatTabs();
  renderHome(searchInput.value,activeCat);
}

function deleteCategory(section){
  var pages=getPages();
  var inUse=pages.filter(function(p){return p.section===section;});
  if(inUse.length){
    if(!confirm("This category has "+inUse.length+" page(s). Delete the category AND all its pages?"))return;
    pages=pages.filter(function(p){return p.section!==section;});
    savePages(pages);
  }else{
    if(!confirm("Delete the '"+section+"' category?"))return;
  }
  var custom=loadCustomSections().filter(function(c){return c.section!==section;});
  saveCustomSections(custom);
  if(tagMap[section] && activeCat===tagMap[section])activeCat="all";
  refreshCategoryConfig();
  renderCatTabs();
  renderHome(searchInput.value,activeCat);
}

function renderHome(filter,cat){
  filter=filter||"";cat=cat||"all";
  var pages=getPages(),ft=filter.trim().toLowerCase();
  var filtered=pages;
  if(ft)filtered=filtered.filter(function(p){return p.title.toLowerCase().indexOf(ft)>=0||p.desc.toLowerCase().indexOf(ft)>=0||p.body.toLowerCase().indexOf(ft)>=0;});
  if(cat!=="all")filtered=filtered.filter(function(p){return p.tag===cat;});
  var addCardHtml="<div class='add-card' onclick=\"openEditor(null,'"+cat+"')\">+ Add New Page</div>";
  if(!filtered.length){
    var msg=adminMode?"<div class='no-results'>No pages here yet. Add one below.</div>":"<div class='no-results'>No results found.</div>";
    homeGrid.innerHTML=msg+addCardHtml;
    return;
  }
  var h="";
  sectionOrder.forEach(function(sec){
    var sp=filtered.filter(function(p){return p.section===sec;});
    if(!sp.length)return;
    h+="<div class='section-label'><span class='dot' style='background:"+(sectionColors[sec]||"#888")+"'></span>"+sec+"</div><div class='card-grid'>";
    sp.forEach(function(p){
      h+="<div class='card' data-cat='"+p.tag+"' onclick=\"showPage('"+p.id+"')\">";
      h+="<button class='card-edit-btn' onclick=\"event.stopPropagation();openEditor('"+p.id+"')\">&#9999;&#65039;</button>";
      h+="<div class='card-move-btns'><button class='card-move-btn' onclick=\"event.stopPropagation();movePage('"+p.id+"',-1)\">&#9650;</button><button class='card-move-btn' onclick=\"event.stopPropagation();movePage('"+p.id+"',1)\">&#9660;</button></div>";
      h+="<span class='card-icon'>"+p.icon+"</span>";
      h+="<div class='card-title'>"+p.title+"</div>";
      h+="<div class='card-desc'>"+p.desc+"</div>";
      h+="<span class='card-tag "+(tagClass[p.tag]||"")+"'>"+p.section+"</span></div>";
    });
    h+="</div>";
  });
  h+=addCardHtml;
  homeGrid.innerHTML=h;
}

function showPage(id){
  var p=getPages().find(function(x){return x.id===id;});if(!p)return;
  document.body.classList.add("showing-page");
  pageView.innerHTML="<span class='pv-tag "+(tagClass[p.tag]||"")+"'>"+p.section+"</span>"+
    "<h1 class='pv-h1'>"+p.icon+" "+p.title+"</h1>"+
    "<p class='pv-sub'>"+p.desc+"</p>"+
    "<div class='pv-body'>"+p.body+"</div>";
  window.scrollTo(0,0);var pb=pageView.querySelector(".pv-body");if(pb)pb.innerHTML=pb.innerHTML.replace(/\{\{IMG:([^}]+)\}\}/g,function(_,k){return ssImg(k);});
}

function goHome(){document.body.classList.remove("showing-page");renderHome(searchInput.value,activeCat);window.scrollTo(0,0);}

function requestMgr(){
  if(adminMode){adminMode=false;document.body.classList.remove("admin-on");document.getElementById("mgrBtn").classList.remove("on");document.getElementById("mgrBtn").innerHTML="&#128274; Manager";renderCatTabs();renderHome(searchInput.value,activeCat);return;}
  document.getElementById("pwOverlay").classList.add("show");document.getElementById("pwInput").value="";document.getElementById("pwInput").focus();document.getElementById("pwErr").style.display="none";
}

function checkPw(){
  if(document.getElementById("pwInput").value===MGR_PW){
    document.getElementById("pwOverlay").classList.remove("show");
    adminMode=true;document.body.classList.add("admin-on");
    document.getElementById("mgrBtn").classList.add("on");document.getElementById("mgrBtn").innerHTML="&#128275; Editing";
    renderCatTabs();
    renderHome(searchInput.value,activeCat);
  }else{document.getElementById("pwErr").style.display="block";}
}

function openEditor(id,presetTag){
  var pages=getPages();
  var p=id?pages.find(function(x){return x.id===id;}):null;
  var presetSection=null;
  if(!p&&presetTag&&presetTag!=="all"){
    for(var sec in tagMap){if(tagMap[sec]===presetTag){presetSection=sec;break;}}
  }
  var sects="";
  sectionOrder.forEach(function(s){
    var isSelected=p?p.section===s:s===presetSection;
    sects+="<option value='"+s+"' "+(isSelected?"selected":"")+">"+s+"</option>";
  });
  var delBtn=p?"<button class='btn-delete' onclick=\"deletePage('"+p.id+"')\">Delete</button>":"";
  var saveId=id||"";
  editModal.innerHTML="<h2>"+(p?"Edit Page":"New Page")+"</h2>"+
    "<label>Title</label><input id='ed-title' value='"+(p?p.title.replace(/'/g,"&#39;"):"")+"'>"+
    "<label>Icon (emoji)</label><input id='ed-icon' value='"+(p?p.icon:"&#128196;")+"' maxlength='4'>"+
    "<label>Description</label><input id='ed-desc' value='"+(p?p.desc.replace(/'/g,"&#39;"):"")+"'>"+
    "<label>Section</label><select id='ed-section'>"+sects+"</select>"+
    "<label>Content (HTML)</label><textarea id='ed-body'>"+(p?p.body.replace(/</g,"&lt;").replace(/>/g,"&gt;"):"")+"</textarea>"+
    "<div class='edit-hint'>HTML tags: h2, h3, p, ul/li, table.kb-table, div.callout, div.copy-block</div>"+
    "<div class='edit-btns'>"+delBtn+
    "<button class='btn-cancel' onclick='closeEditor()'>Cancel</button>"+
    "<button class='btn-save' onclick=\"savePage('"+saveId+"')\">Save</button></div>";
  editOverlay.classList.add("show");
}
function closeEditor(){editOverlay.classList.remove("show");}
function savePage(id){
  var pages=getPages();
  var t=document.getElementById("ed-title").value.trim();
  var ic=document.getElementById("ed-icon").value.trim()||"📄";
  var d=document.getElementById("ed-desc").value.trim();
  var sec=document.getElementById("ed-section").value;
  var b=document.getElementById("ed-body").value;
  var tag=tagMap[sec]||"training";
  if(!t){alert("Title required");return;}
  if(id){var idx=-1;for(var i=0;i<pages.length;i++){if(pages[i].id===id){idx=i;break;}}
    if(idx>=0){pages[idx].title=t;pages[idx].icon=ic;pages[idx].desc=d;pages[idx].section=sec;pages[idx].tag=tag;pages[idx].body=b;}}
  else{pages.push({id:"page_"+Date.now(),section:sec,icon:ic,title:t,desc:d,tag:tag,body:b});}
  savePages(pages);closeEditor();renderHome(searchInput.value,activeCat);
}
function deletePage(id){if(!confirm("Delete this page?"))return;var p=getPages().filter(function(x){return x.id!==id;});savePages(p);closeEditor();renderHome(searchInput.value,activeCat);}

function movePage(id,dir){
  var pages=getPages();
  var idx=pages.findIndex(function(x){return x.id===id;});
  if(idx<0)return;
  var sec=pages[idx].section,swapIdx=-1;
  if(dir<0){for(var i=idx-1;i>=0;i--){if(pages[i].section===sec){swapIdx=i;break;}}}
  else{for(var i=idx+1;i<pages.length;i++){if(pages[i].section===sec){swapIdx=i;break;}}}
  if(swapIdx<0)return;
  var tmp=pages[idx];pages[idx]=pages[swapIdx];pages[swapIdx]=tmp;
  savePages(pages);
  renderHome(searchInput.value,activeCat);
}

function copyBlock(el){
  var btn=el.querySelector(".copy-btn");
  var text=el.innerText.replace(/^Copy\s*/,"").trim();
  navigator.clipboard.writeText(text).then(function(){btn.textContent="Copied!";btn.classList.add("copied");setTimeout(function(){btn.textContent="Copy";btn.classList.remove("copied");},1500);});
}


document.addEventListener("DOMContentLoaded",function(){
  homeGrid=document.getElementById("homeGrid");
  pageView=document.getElementById("pageView");
  searchInput=document.getElementById("searchInput");
  catTabs=document.getElementById("catTabs");
  editOverlay=document.getElementById("editOverlay");
  editModal=document.getElementById("editModal");

  searchInput.addEventListener("input",function(){if(document.body.classList.contains("showing-page"))goHome();if(searchInput.value.trim()){activeCat="all";}renderHome(searchInput.value,activeCat);renderCatTabs();});
  catTabs.addEventListener("click",function(e){
    if(e.target.classList.contains("cat-tab-del"))return;
    if(e.target.classList.contains("cat-tab-add"))return;
    var tab=e.target.closest(".cat-tab");
    if(!tab||tab.classList.contains("cat-tab-add"))return;
    if(!tab.dataset.filter)return;
    activeCat=tab.dataset.filter;
    renderCatTabs();
    renderHome(searchInput.value,activeCat);
  });
  document.addEventListener("keydown",function(e){if(e.key==="Escape"){if(editOverlay.classList.contains("show"))closeEditor();else if(document.getElementById("pwOverlay").classList.contains("show"))document.getElementById("pwOverlay").classList.remove("show");else if(document.body.classList.contains("showing-page"))goHome();}});
  editOverlay.addEventListener("click",function(e){if(e.target===editOverlay)closeEditor();});
  document.getElementById("pwOverlay").addEventListener("click",function(e){if(e.target.id==="pwOverlay")e.target.classList.remove("show");});

  refreshCategoryConfig();
  renderCatTabs();
  renderHome();
});
</script>
</body>
</html>
